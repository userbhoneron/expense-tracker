<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Tracker</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: Arial;
    background: #f4f4f4;
    transition: 0.3s;
}

body.dark {
    background: #121212;
    color: #eee;
}

.container {
    max-width: 520px;
    width: 95%;
    margin: 20px auto;
    background: white;
    padding: 15px;
    border-radius: 12px;
}

body.dark .container {
    background: #1e1e1e;
}

input, select {
    width: 100%;
    padding: 12px;
    margin-top: 6px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

body.dark input, body.dark select {
    background: #2c2c2c;
    color: white;
    border: 1px solid #444;
}

.add {
    width: 100%;
    padding: 12px;
    margin-top: 8px;
    border: none;
    border-radius: 8px;
    background: #66bb6a;
    color: white;
    font-weight: bold;
}

/* FLOATING BUTTONS */
.fab {
    position: fixed;
    right: 15px;
    width: 45px;
    height: 45px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
}

#darkBtn { top: 15px; background:#2e7d32; color:white; }
#searchBtn { top: 70px; background:#43a047; color:white; }
#reportBtn { top: 125px; background:#1e88e5; color:white; }

/* SEARCH */
.searchBox { display:none; margin-bottom:10px; }

/* EXPENSE */
.expense-wrapper {
    position: relative;
    height: 60px;
    margin-top: 8px;
    overflow: hidden;
    border-radius: 10px;
}

.delete-bg {
    position: absolute;
    right: 0;
    width: 80px;
    height: 100%;
    background: #e53935;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-weight:bold;
}

.expense {
    position:absolute;
    width:100%;
    height:100%;
    background:#f1f1f1;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px;
    transition:transform 0.2s;
}

body.dark .expense { background:#2a2a2a; }

/* REPORT MODAL */
#reportModal {
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.6);
    display:none;
    justify-content:center;
    align-items:center;
}

#reportBox {
    background:white;
    width:90%;
    max-width:420px;
    padding:15px;
    border-radius:12px;
}
canvas { width:100% !important; max-height:260px; }
</style>
</head>

<body>

<button id="darkBtn" class="fab" onclick="toggleDark()">🌙</button>
<button id="searchBtn" class="fab" onclick="toggleSearch()">🔍</button>
<button id="reportBtn" class="fab" onclick="toggleReport()">📊</button>

<div class="container">

<h2>Expense Tracker</h2>

<div class="searchBox" id="searchBox">
    <input id="searchInput" placeholder="Search...">
</div>

<input id="name" placeholder="Name">
<input id="amount" type="number" placeholder="Amount">
<input id="date" type="date">

<select id="category" onchange="handleCategory()"></select>
<input id="customCategory" placeholder="Custom Category" disabled>

<button class="add" onclick="addExpense()">Add Expense</button>

<div id="list"></div>
<div id="total"></div>

<h4>Trend</h4>
<canvas id="lineChart"></canvas>

<h4>Category</h4>
<canvas id="pieChart"></canvas>

</div>

<!-- REPORT -->
<div id="reportModal">
<div id="reportBox">

<!-- STEP 1 FORM -->
<div id="reportForm">
<h3>📊 Report Builder</h3>

<select id="rYear"></select>
<select id="rMonth">
<option value="">All Months</option>
<option value="01">Jan</option>
<option value="02">Feb</option>
<option value="03">Mar</option>
<option value="04">Apr</option>
<option value="05">May</option>
<option value="06">Jun</option>
<option value="07">Jul</option>
<option value="08">Aug</option>
<option value="09">Sep</option>
<option value="10">Oct</option>
<option value="11">Nov</option>
<option value="12">Dec</option>
</select>

<select id="rCategory"></select>

<input id="rMin" type="number" placeholder="Min Price">
<input id="rMax" type="number" placeholder="Max Price">
<input id="rStart" type="date">
<input id="rEnd" type="date">

<button class="add" onclick="generateReport()">Generate Report</button>
<button onclick="toggleReport()" class="del" style="margin-top:10px;width:100%;">Close</button>
</div>

<!-- STEP 2 RESULTS -->
<div id="reportResult" style="display:none;">
<h3>📊 Report Results</h3>

<div id="reportSummary"></div>

<h4>Category Pie</h4>
<canvas id="reportPie"></canvas>

<h4>Expenses</h4>
<div id="reportList"></div>

<button class="add" onclick="backToForm()">Back</button>
</div>

</div>
</div>

<script>
let expenses = JSON.parse(localStorage.getItem("expenses")) || [];
let customCategories = JSON.parse(localStorage.getItem("customCategories")) || [];

let lineChart, pieChart, reportPie;

/* INIT */
loadCategories();

/* CATEGORIES */
function loadCategories(){
    const base=["Food","Transport","Shopping","Bills","Other"];
    const sel=document.getElementById("category");
    sel.innerHTML="";
    base.forEach(c=>sel.innerHTML+=`<option>${c}</option>`);
}

/* DARK */
function toggleDark(){ document.body.classList.toggle("dark"); }

/* SEARCH */
function toggleSearch(){
    const box=document.getElementById("searchBox");
    box.style.display = box.style.display==="block"?"none":"block";
    document.getElementById("searchInput").value="";
    render();
}

/* REPORT */
function toggleReport(){
    const m=document.getElementById("reportModal");
    m.style.display = m.style.display==="flex"?"none":"flex";
    document.getElementById("reportForm").style.display="block";
    document.getElementById("reportResult").style.display="none";
}

/* SWITCH */
function backToForm(){
    document.getElementById("reportForm").style.display="block";
    document.getElementById("reportResult").style.display="none";
}

/* ADD */
function addExpense(){
    expenses.push({
        name:name.value,
        amount:+amount.value,
        date:date.value,
        category:category.value
    });
    localStorage.setItem("expenses",JSON.stringify(expenses));
    render();
}

/* DELETE */
function deleteExpense(i){
    expenses.splice(i,1);
    localStorage.setItem("expenses",JSON.stringify(expenses));
    render();
}

/* EDIT */
function editExpense(i){
    let e=expenses[i];
    name.value=e.name;
    amount.value=e.amount;
    date.value=e.date;
    category.value=e.category;
}

/* RENDER */
function render(){
    const list=document.getElementById("list");
    const search=(searchInput?.value||"").toLowerCase();

    list.innerHTML="";
    let total=0;

    expenses.forEach((e,i)=>{
        if(search && !e.name.toLowerCase().includes(search)) return;

        total+=e.amount;

        list.innerHTML+=`
        <div class="expense-wrapper">
            <div class="delete-bg" onclick="deleteExpense(${i})">X</div>
            <div class="expense">
                <div>
                    <b>${e.name}</b><br>
                    <small>${e.date} • ${e.category}</small>
                </div>
                <div>
                    ${e.amount}
                    <button class="edit" onclick="editExpense(${i})">Edit</button>
                </div>
            </div>
        </div>`;
    });

    document.getElementById("total").innerText="Total: "+total;
    drawCharts();
}

/* REPORT ENGINE */
function generateReport(){
    let f=[...expenses];

    if(rCategory.value) f=f.filter(e=>e.category===rCategory.value);
    if(rMin.value) f=f.filter(e=>e.amount>=+rMin.value);
    if(rMax.value) f=f.filter(e=>e.amount<=+rMax.value);

    let total=0;
    let cat={};

    f.forEach(e=>{
        total+=e.amount;
        cat[e.category]=(cat[e.category]||0)+e.amount;
    });

    reportSummary.innerHTML=`
    <b>Total:</b> ${total}<br>
    <b>Items:</b> ${f.length}
    `;

    if(reportPie) reportPie.destroy();

    reportPie=new Chart(document.getElementById("reportPie"),{
        type:"pie",
        data:{
            labels:Object.keys(cat),
            datasets:[{data:Object.values(cat)}]
        }
    });

    reportList.innerHTML=f.map(e=>`
    <div>${e.name} - ${e.amount}</div>
    `).join("");

    document.getElementById("reportForm").style.display="none";
    document.getElementById("reportResult").style.display="block";
}

/* CHARTS */
function drawCharts(){
    const ctx1=lineChartCtx.getContext("2d");
    const ctx2=pieChartCtx.getContext("2d");
}

/* INIT */
render();
</script>

</body>
</html>
