<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Tracker Pro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: Arial;
    background: #f4f4f4;
    transition: 0.3s;
}

body.dark {
    background: #121212;
    color: #eee;
}

.container {
    width: 95%;
    max-width: 520px;
    margin: 10px auto;
    background: white;
    padding: 15px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

body.dark .container {
    background: #1e1e1e;
}

h2 { margin-top: 0; }

input, select {
    width: 100%;
    padding: 12px;
    margin-top: 6px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 16px;
}

body.dark input,
body.dark select {
    background: #2c2c2c;
    color: white;
    border: 1px solid #444;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 8px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    font-size: 16px;
}

.add { background: #28a745; color: white; }

.toggle {
    background: #333;
    color: white;
}

.expense {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #f1f1f1;
    padding: 10px;
    margin-top: 8px;
    border-radius: 8px;
    flex-wrap: wrap;
}

body.dark .expense {
    background: #2a2a2a;
}

.expense small {
    display: block;
    opacity: 0.7;
}

.del {
    background: #dc3545;
    color: white;
    padding: 6px 10px;
    border-radius: 6px;
}

.edit {
    background: #ffc107;
    padding: 6px 10px;
    border-radius: 6px;
    margin-right: 5px;
}

.total {
    text-align: right;
    font-weight: bold;
    margin-top: 10px;
}

canvas {
    width: 100% !important;
    height: 260px !important;
}
</style>
</head>

<body>

<div class="container">
    <h2>Expense Tracker</h2>

    <button class="toggle" onclick="toggleDark()">🌙 Toggle Dark Mode</button>

    <input id="name" placeholder="Name">
    <input id="amount" type="number" placeholder="Amount">
    <input id="date" type="date">

    <!-- CATEGORY -->
    <select id="category" onchange="handleCategory()">
        <option value="">Select Category</option>
        <option>Food</option>
        <option>Transport</option>
        <option>Shopping</option>
        <option>Bills</option>
        <option>Entertainment</option>
        <option>Other</option>
    </select>

    <!-- CUSTOM CATEGORY -->
    <input id="customCategory" placeholder="Custom Category (optional)" disabled>

    <button class="add" onclick="addExpense()">Add Expense</button>

    <div id="list"></div>
    <div class="total" id="total"></div>

    <canvas id="graph"></canvas>
</div>

<script>
let expenses = JSON.parse(localStorage.getItem("expenses")) || [];
expenses = expenses.map(e => ({
    name: e.name || "Unknown",
    amount: Number(e.amount) || 0,
    date: e.date || "",
    category: e.category || "Other"
}));

let editingIndex = null;
let chart;

/* DARK MODE */
function toggleDark() {
    document.body.classList.toggle("dark");
    localStorage.setItem("darkMode", document.body.classList.contains("dark"));
}

if (localStorage.getItem("darkMode") === "true") {
    document.body.classList.add("dark");
}

/* CATEGORY HANDLER */
function handleCategory() {
    const cat = document.getElementById("category").value;
    const custom = document.getElementById("customCategory");

    if (cat === "Other") {
        custom.disabled = false;
    } else {
        custom.disabled = true;
        custom.value = "";
    }
}

/* SAVE */
function save() {
    localStorage.setItem("expenses", JSON.stringify(expenses));
}

/* ADD */
function addExpense() {
    const name = document.getElementById("name").value.trim();
    const amount = parseFloat(document.getElementById("amount").value);
    const date = document.getElementById("date").value;
    const category = document.getElementById("category").value;
    const custom = document.getElementById("customCategory").value.trim();

    if (!name || isNaN(amount) || !date || !category) {
        alert("Fill all required fields");
        return;
    }

    const finalCategory = category === "Other" && custom ? custom : category;

    if (editingIndex !== null) {
        expenses[editingIndex] = { name, amount, date, category: finalCategory };
        editingIndex = null;
    } else {
        expenses.push({ name, amount, date, category: finalCategory });
    }

    save();
    clearInputs();
    render();
}

/* CLEAR */
function clearInputs() {
    document.getElementById("name").value = "";
    document.getElementById("amount").value = "";
    document.getElementById("date").value = "";
    document.getElementById("category").value = "";
    document.getElementById("customCategory").value = "";
    document.getElementById("customCategory").disabled = true;
}

/* DELETE */
function deleteExpense(i) {
    expenses.splice(i, 1);
    save();
    render();
}

/* EDIT */
function editExpense(i) {
    const e = expenses[i];
    document.getElementById("name").value = e.name;
    document.getElementById("amount").value = e.amount;
    document.getElementById("date").value = e.date;
    document.getElementById("category").value = e.category;
    editingIndex = i;
}

/* RENDER */
function render() {
    const list = document.getElementById("list");
    const total = document.getElementById("total");

    list.innerHTML = "";
    let sum = 0;

    expenses.forEach((e, i) => {
        sum += e.amount;

        const div = document.createElement("div");
        div.className = "expense";

        div.innerHTML = `
            <div>
                <b>${e.name}</b>
                <small>${e.date} • ${e.category}</small>
            </div>
            <div>
                ${e.amount.toFixed(2)}
                <button class="edit" onclick="editExpense(${i})">Edit</button>
                <button class="del" onclick="deleteExpense(${i})">X</button>
            </div>
        `;

        list.appendChild(div);
    });

    total.innerText = "Total: " + sum.toFixed(2);
    drawGraph();
}

/* GRAPH */
function drawGraph() {
    const ctx = document.getElementById("graph").getContext("2d");
    if (chart) chart.destroy();

    if (expenses.length === 0) return;

    const grouped = {};
    expenses.forEach(e => {
        if (!grouped[e.date]) grouped[e.date] = 0;
        grouped[e.date] += e.amount;
    });

    const dates = Object.keys(grouped).sort();
    const values = dates.map(d => grouped[d]);

    chart = new Chart(ctx, {
        type: "line",
        data: {
            labels: dates,
            datasets: [{
                data: values,
                borderColor: "green",
                backgroundColor: "rgba(0,128,0,0.2)",
                fill: true,
                tension: 0.3,
                pointRadius: 5
            }]
        },
        options: {
            responsive: true,
            plugins: { legend: { display: false } },
            scales: {
                x: { title: { display: true, text: "Date" } },
                y: { title: { display: true, text: "Amount" }, beginAtZero: true }
            }
        }
    });
}

/* INIT */
render();
</script>

</body>
</html>
