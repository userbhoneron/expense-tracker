<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Tracker</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: Arial;
    background: #f4f4f4;
    transition: 0.3s;
}

body.dark {
    background: #121212;
    color: #eee;
}

/* FLOATING BUTTONS */
.fab {
    position: fixed;
    width: 45px;
    height: 45px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    font-size: 18px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    z-index: 100;
}

/* dark mode button */
#darkBtn {
    top: 15px;
    right: 15px;
    background: #2e7d32;
    color: white;
}

/* search button */
#searchBtn {
    top: 70px;
    right: 15px;
    background: #43a047;
    color: white;
}

/* CONTAINER */
.container {
    max-width: 520px;
    width: 95%;
    margin: 20px auto;
    background: white;
    padding: 15px;
    border-radius: 12px;
}

body.dark .container {
    background: #1e1e1e;
}

/* INPUTS */
input, select {
    width: 100%;
    padding: 12px;
    margin-top: 6px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

body.dark input,
body.dark select {
    background: #2c2c2c;
    color: white;
    border: 1px solid #444;
}

/* ADD BUTTON (LIGHT GREEN) */
.add {
    width: 100%;
    padding: 12px;
    margin-top: 8px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    background: #66bb6a;
    color: white;
}

.add:hover {
    background: #4caf50;
}

/* EXPENSE */
.expense {
    display: flex;
    justify-content: space-between;
    background: #f1f1f1;
    padding: 10px;
    margin-top: 8px;
    border-radius: 8px;
}

body.dark .expense {
    background: #2a2a2a;
}

/* EDIT / DELETE */
.edit {
    background: #a5d6a7;
    border: none;
    padding: 6px 10px;
    border-radius: 6px;
    margin-right: 5px;
    cursor: pointer;
}

.del {
    background: #ef5350;
    color: white;
    border: none;
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;
}

body.dark .edit {
    background: #81c784;
}

body.dark .del {
    background: #e57373;
}

/* TOTAL */
.total {
    text-align: right;
    font-weight: bold;
    margin-top: 10px;
}

/* SEARCH BOX */
.searchBox {
    display: none;
    margin-bottom: 10px;
}

/* CHARTS */
canvas {
    width: 100% !important;
    max-height: 260px;
}
</style>
</head>

<body>

<!-- FLOATING BUTTONS -->
<button id="darkBtn" class="fab" onclick="toggleDark()">🌙</button>
<button id="searchBtn" class="fab" onclick="toggleSearch()">🔍</button>

<div class="container">
    <h2>Expense Tracker</h2>

    <div class="searchBox" id="searchBox">
        <input id="searchInput" placeholder="Search...">
    </div>

    <input id="name" placeholder="Name">
    <input id="amount" type="number" placeholder="Amount">
    <input id="date" type="date">

    <select id="category" onchange="handleCategory()">
        <option value="">Category</option>
        <option>Food</option>
        <option>Transport</option>
        <option>Shopping</option>
        <option>Bills</option>
        <option>Entertainment</option>
        <option>Other</option>
    </select>

    <input id="customCategory" placeholder="Custom Category (optional)" disabled>

    <button class="add" onclick="addExpense()">Add Expense</button>

    <div id="list"></div>
    <div class="total" id="total"></div>

    <h4>Trend</h4>
    <canvas id="lineChart"></canvas>

    <h4>Category Breakdown</h4>
    <canvas id="pieChart"></canvas>
</div>

<script>
let expenses = JSON.parse(localStorage.getItem("expenses")) || [];

expenses = expenses.map(e => ({
    name: e.name || "",
    amount: Number(e.amount) || 0,
    date: e.date || "",
    category: e.category || "Other"
}));

let editingIndex = null;
let lineChart, pieChart;

/* DARK MODE */
function toggleDark() {
    document.body.classList.toggle("dark");
}

/* SEARCH */
function toggleSearch() {
    const box = document.getElementById("searchBox");
    box.style.display = box.style.display === "block" ? "none" : "block";
}

/* CATEGORY */
function handleCategory() {
    customCategory.disabled = category.value !== "Other";
}

/* ADD */
function addExpense() {
    const name = nameInput.value.trim();
    const amount = parseFloat(amountInput.value);
    const date = dateInput.value;
    const cat = category.value;
    const custom = customCategory.value.trim();

    if (!name || isNaN(amount) || !date || !cat) {
        alert("Fill all fields");
        return;
    }

    const finalCat = cat === "Other" && custom ? custom : cat;

    expenses.push({ name, amount, date, category: finalCat });

    save();
    clearInputs();
    render();
}

/* SAVE */
function save() {
    localStorage.setItem("expenses", JSON.stringify(expenses));
}

/* CLEAR */
function clearInputs() {
    nameInput.value = "";
    amountInput.value = "";
    dateInput.value = "";
    category.value = "";
    customCategory.value = "";
    customCategory.disabled = true;
}

/* DELETE */
function deleteExpense(i) {
    expenses.splice(i, 1);
    save();
    render();
}

/* EDIT */
function editExpense(i) {
    const e = expenses[i];
    nameInput.value = e.name;
    amountInput.value = e.amount;
    dateInput.value = e.date;
    category.value = e.category;
    editingIndex = i;
}

/* RENDER */
function render() {
    const list = document.getElementById("list");
    const total = document.getElementById("total");

    list.innerHTML = "";
    let sum = 0;

    expenses.forEach((e, i) => {
        sum += e.amount;

        const div = document.createElement("div");
        div.className = "expense";

        div.innerHTML = `
            <div>
                <b>${e.name}</b><br>
                <small>${e.date} • ${e.category}</small>
            </div>
            <div>
                ${e.amount.toFixed(2)}
                <button class="edit" onclick="editExpense(${i})">Edit</button>
                <button class="del" onclick="deleteExpense(${i})">X</button>
            </div>
        `;

        list.appendChild(div);
    });

    total.innerText = "Total: " + sum.toFixed(2);

    drawCharts();
}

/* CHARTS */
function drawCharts() {
    const dateMap = {};
    const catMap = {};

    expenses.forEach(e => {
        dateMap[e.date] = (dateMap[e.date] || 0) + e.amount;
        catMap[e.category] = (catMap[e.category] || 0) + e.amount;
    });

    const dates = Object.keys(dateMap).sort();
    const values = dates.map(d => dateMap[d]);

    if (lineChart) lineChart.destroy();
    if (pieChart) pieChart.destroy();

    lineChart = new Chart(lineChartCtx, {
        type: "line",
        data: {
            labels: dates,
            datasets: [{
                data: values,
                borderColor: "green",
                backgroundColor: "rgba(0,128,0,0.2)",
                tension: 0.3,
                fill: true,
                pointRadius: 5,
                pointBackgroundColor: "green"
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false
        }
    });

    pieChart = new Chart(pieChartCtx, {
        type: "pie",
        data: {
            labels: Object.keys(catMap),
            datasets: [{
                data: Object.values(catMap),
                backgroundColor: ["#66bb6a","#42a5f5","#ffa726","#ab47bc","#ef5350"]
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: true,
            aspectRatio: 1
        }
    });
}

/* INIT */
const lineChartCtx = document.getElementById("lineChart").getContext("2d");
const pieChartCtx = document.getElementById("pieChart").getContext("2d");

render();
</script>

</body>
</html>
