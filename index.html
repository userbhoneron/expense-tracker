<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Expense Tracker</title>

<style>
* { box-sizing: border-box; }

body {
    font-family: Arial;
    background: #f4f4f4;
    margin: 0;
}

/* TOP BAR */
.topbar {
    display: flex;
    align-items: center;
    padding: 10px;
    background: #222;
    color: white;
}

.menu-btn {
    font-size: 22px;
    cursor: pointer;
    margin-right: 10px;
}

/* SIDEBAR */
.sidebar {
    position: fixed;
    top: 0;
    left: -220px;
    width: 220px;
    height: 100%;
    background: #333;
    color: white;
    padding: 10px;
    transition: 0.3s;
}

.sidebar.open {
    left: 0;
}

.sidebar button {
    width: 100%;
    margin-top: 10px;
    padding: 10px;
    border: none;
    cursor: pointer;
    border-radius: 6px;
}

.sidebar .active {
    background: #28a745;
    color: white;
}

/* MAIN */
.container {
    max-width: 520px;
    margin: 20px auto;
    background: white;
    padding: 15px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

/* FORM */
input, select {
    width: 100%;
    padding: 10px;
    margin-top: 6px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

button {
    cursor: pointer;
}

/* BUTTON COLORS */
.add { background: #28a745; color: white; margin-top: 8px; }
.editBtn { background: #ffc107; border: none; padding: 5px; margin-left: 5px; }
.delBtn { background: #dc3545; color: white; border: none; padding: 5px; }

/* EXPENSE ITEM */
.expense {
    display: flex;
    justify-content: space-between;
    background: #f1f1f1;
    padding: 8px;
    margin-top: 6px;
    border-radius: 6px;
}

/* TOTAL */
.total {
    text-align: right;
    font-weight: bold;
    margin-top: 10px;
}

/* GRAPH FIXED */
.graph {
    margin-top: 15px;
    height: 260px;
    overflow: hidden;
    background: #fafafa;
    border-radius: 10px;
}

svg {
    width: 100%;
    height: 100%;
}
</style>
</head>

<body>

<div class="topbar">
    <div class="menu-btn" onclick="toggleSidebar()">☰</div>
    Expense Tracker
</div>

<div class="sidebar" id="sidebar">
    <button onclick="showApp('tracker')" class="active">Expense Tracker</button>
    <button onclick="showApp('currency')">Currency Converter</button>
</div>

<!-- EXPENSE TRACKER -->
<div class="container" id="tracker">

    <h3>Add Expense</h3>

    <input id="name" placeholder="Name">
    <input id="amount" type="number" placeholder="Amount">
    <input id="date" type="date">

    <button class="add" onclick="addExpense()">Add</button>

    <div id="list"></div>
    <div class="total" id="total"></div>

    <div class="graph">
        <svg id="graph"></svg>
    </div>
</div>

<!-- CURRENCY -->
<div class="container" id="currency" style="display:none">

    <h3>Currency Converter</h3>

    <input id="amountConv" type="number" placeholder="Amount">

    <select id="fromCur">
        <option value="USD">USD</option>
        <option value="THB">THB</option>
        <option value="MMK">MMK</option>
    </select>

    <select id="toCur">
        <option value="USD">USD</option>
        <option value="THB">THB</option>
        <option value="MMK">MMK</option>
    </select>

    <button class="add" onclick="convert()">Convert</button>

    <h3 id="result"></h3>
</div>

<script>

let expenses = JSON.parse(localStorage.getItem("expenses")) || [];
let rates = {};

async function loadRates() {
    try {
        const res = await fetch("/.netlify/functions/rates");
        const data = await res.json();
        rates = data.rates || {};
    } catch (e) {
        console.log("rate load failed");
    }
}

function save() {
    localStorage.setItem("expenses", JSON.stringify(expenses));
}

function addExpense() {
    const name = document.getElementById("name").value;
    const amount = parseFloat(document.getElementById("amount").value);
    const date = document.getElementById("date").value;

    if (!name || !amount || !date) return;

    expenses.push({ name, amount, date });
    save();
    render();
}

function deleteExpense(i) {
    expenses.splice(i,1);
    save();
    render();
}

function editExpense(i) {
    const e = expenses[i];
    document.getElementById("name").value = e.name;
    document.getElementById("amount").value = e.amount;
    document.getElementById("date").value = e.date;

    deleteExpense(i);
}

function render() {
    const list = document.getElementById("list");
    const totalEl = document.getElementById("total");

    list.innerHTML = "";
    let total = 0;

    expenses.forEach((e,i) => {
        total += e.amount;

        list.innerHTML += `
        <div class="expense">
            <div>
                <b>${e.name}</b><br>
                <small>${e.date}</small>
            </div>
            <div>
                ${e.amount}
                <button class="editBtn" onclick="editExpense(${i})">E</button>
                <button class="delBtn" onclick="deleteExpense(${i})">X</button>
            </div>
        </div>`;
    });

    totalEl.innerText = "Total: " + total;

    drawGraph();
}

function drawGraph() {
    const svg = document.getElementById("graph");
    svg.innerHTML = "";

    const values = expenses.map(e => e.amount);
    if (!values.length) return;

    const width = 500;
    const height = 260;

    const max = Math.max(...values);

    const stepX = width / (values.length - 1 || 1);

    const points = values.map((v,i)=>{
        return [
            i * stepX,
            height - (v / max) * height
        ];
    });

    const path = "M " + points.map(p=>p.join(",")).join(" L ");

    const line = document.createElementNS("http://www.w3.org/2000/svg","path");
    line.setAttribute("d", path);
    line.setAttribute("stroke", "blue");
    line.setAttribute("fill", "none");
    line.setAttribute("stroke-width", "2");

    svg.appendChild(line);
}

function convert() {
    const amt = parseFloat(document.getElementById("amountConv").value);
    const from = document.getElementById("fromCur").value;
    const to = document.getElementById("toCur").value;

    if (!amt || !rates[from] || !rates[to]) return;

    const usd = amt / rates[from];
    const result = usd * rates[to];

    document.getElementById("result").innerText =
        result.toFixed(2) + " " + to;
}

function toggleSidebar() {
    document.getElementById("sidebar").classList.toggle("open");
}

function showApp(app) {
    document.getElementById("tracker").style.display = app==="tracker"?"block":"none";
    document.getElementById("currency").style.display = app==="currency"?"block":"none";
}

loadRates();
render();

</script>

</body>
</html>
