<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Tracker</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:#f4f4f4}
body.dark{background:#121212;color:#eee}

.container{
    max-width:520px;
    width:95%;
    margin:20px auto;
    background:white;
    padding:15px;
    border-radius:12px;
}
body.dark .container{background:#1e1e1e}

input,select,textarea{
    width:100%;
    padding:10px;
    margin-top:6px;
    border-radius:8px;
    border:1px solid #ccc;
}

.add{
    width:100%;
    padding:12px;
    margin-top:8px;
    border:none;
    border-radius:8px;
    background:#66bb6a;
    color:white;
    font-weight:bold;
}

/* FAB */
.fab{
    position:fixed;
    right:15px;
    width:45px;height:45px;
    border-radius:50%;
    border:none;
}
#darkBtn{top:15px;background:#2e7d32;color:white}
#searchBtn{top:70px;background:#43a047;color:white}
#reportBtn{top:125px;background:#1e88e5;color:white}
#notesBtn{bottom:20px;background:#fbc02d}

/* Search */
.searchBox{display:none}

/* Swipe */
.expense-wrapper{
    position:relative;
    height:60px;
    margin-top:8px;
    overflow:hidden;
    border-radius:10px;
}
.delete-bg{
    position:absolute;
    right:0;
    width:80px;height:100%;
    background:#dc3545;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
}
.expense{
    position:absolute;
    width:100%;height:100%;
    background:#f1f1f1;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px;
}

/* Buttons */
.editBtn{background:#fbc02d;border:none;padding:5px}
.deleteBtn{background:#e53935;color:white;border:none;padding:5px}

/* Modal */
.modal{
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.6);
    display:none;
    justify-content:center;
    align-items:center;
    padding:10px;
}
.box{
    background:white;
    width:100%;
    max-width:600px;
    max-height:90vh;
    overflow:auto;
    padding:15px;
    border-radius:12px;
}
body.dark .box{background:#1e1e1e}

canvas{width:100%!important;max-height:260px}
</style>
</head>

<body>

<button id="darkBtn" class="fab" onclick="toggleDark()">🌙</button>
<button id="searchBtn" class="fab" onclick="toggleSearch()">🔍</button>
<button id="reportBtn" class="fab" onclick="toggleReport()">📊</button>
<button id="notesBtn" class="fab" onclick="toggleNotes()">📝</button>

<div class="container">

<h2>Expense Tracker</h2>

<div id="searchBox" class="searchBox">
<input id="searchInput" placeholder="Search">
<select id="filterCategory"></select>
<input id="fromDate" type="date">
<input id="toDate" type="date">
<input id="minAmount" type="number" placeholder="Min">
<input id="maxAmount" type="number" placeholder="Max">
</div>

<input id="name" placeholder="Name">
<input id="amount" type="number" placeholder="Amount">
<input id="date" type="date">

<select id="category">
<option>Food</option>
<option>Transport</option>
<option>Shopping</option>
<option>Bills</option>
<option>Entertainment</option>
<option>Other</option>
</select>

<input id="customCategory" placeholder="Custom Category" disabled>

<button class="add" onclick="addExpense()">Add Expense</button>

<div id="list"></div>
<div id="total"></div>

<h4>Trend</h4>
<canvas id="lineChart"></canvas>

<h4>Category Breakdown</h4>
<canvas id="pieChart"></canvas>

</div>

<!-- REPORT -->
<div id="reportModal" class="modal">
<div class="box">
<h3>Report</h3>

<input id="rFrom" type="date">
<input id="rTo" type="date">
<select id="rCategory"></select>
<input id="rMin" type="number" placeholder="Min">
<input id="rMax" type="number" placeholder="Max">

<button class="add" onclick="generateReport()">Generate</button>

<div id="reportOutput"></div>

<canvas id="reportLine"></canvas>
<canvas id="reportPie"></canvas>

<button onclick="toggleReport()">Close</button>
</div>
</div>

<!-- NOTES -->
<div id="notesModal" class="modal">
<div class="box">
<h3>Notes</h3>

<textarea id="notesArea" rows="6"></textarea>
<button class="add" onclick="saveNotes()">Save</button>

<hr>
<div id="autoNotes"></div>

<button onclick="toggleNotes()">Close</button>
</div>
</div>

<script>
let expenses=JSON.parse(localStorage.getItem("expenses"))||[];
let notes=localStorage.getItem("notes")||"";

let lineChart,pieChart,reportLineChart,reportPieChart;

function toggleDark(){document.body.classList.toggle("dark")}
function toggleSearch(){
    searchBox.style.display=searchBox.style.display==="block"?"none":"block";
}

category.onchange=()=>{
    customCategory.disabled=category.value!=="Other";
}

function addExpense(){
    let cat=category.value==="Other"?customCategory.value:category.value;
    if(!name.value||!amount.value||!date.value)return;

    expenses.push({name:name.value,amount:+amount.value,date:date.value,category:cat});
    localStorage.setItem("expenses",JSON.stringify(expenses));

    name.value="";amount.value="";date.value="";customCategory.value="";
    render();
}

function deleteExpense(i){
    if(confirm("Delete this expense?")){
        expenses.splice(i,1);
        localStorage.setItem("expenses",JSON.stringify(expenses));
        render();
    }
}

function editExpense(i){
    const e=expenses[i];
    name.value=e.name;
    amount.value=e.amount;
    date.value=e.date;
    category.value=e.category;
}

function render(){
    list.innerHTML="";
    let sum=0;

    const text=searchInput.value?.toLowerCase()||"";

    expenses.forEach((e,i)=>{
        if(text && !e.name.toLowerCase().includes(text)) return;

        sum+=e.amount;

        list.innerHTML+=`
        <div class="expense-wrapper">
            <div class="delete-bg" onclick="deleteExpense(${i})">X</div>
            <div class="expense">
                <div><b>${e.name}</b><br>${e.date} • ${e.category}</div>
                <div>
                    ${e.amount}
                    <button class="editBtn" onclick="editExpense(${i})">Edit</button>
                    <button class="deleteBtn" onclick="deleteExpense(${i})">Del</button>
                </div>
            </div>
        </div>`;
    });

    total.innerText="Total: "+sum;

    drawCharts();
}

function drawCharts(){
    const dateMap={},catMap={};

    expenses.forEach(e=>{
        dateMap[e.date]=(dateMap[e.date]||0)+e.amount;
        catMap[e.category]=(catMap[e.category]||0)+e.amount;
    });

    if(lineChart)lineChart.destroy();
    if(pieChart)pieChart.destroy();

    lineChart=new Chart(lineChartCanvas,{
        type:"line",
        data:{labels:Object.keys(dateMap),datasets:[{data:Object.values(dateMap)}]}
    });

    pieChart=new Chart(pieChartCanvas,{
        type:"pie",
        data:{labels:Object.keys(catMap),datasets:[{data:Object.values(catMap)}]}
    });
}

function toggleReport(){
    reportModal.style.display=reportModal.style.display==="flex"?"none":"flex";
}

function generateReport(){
    const filtered=expenses.filter(e=>{
        return (!rFrom.value||e.date>=rFrom.value)&&
               (!rTo.value||e.date<=rTo.value);
    });

    reportOutput.innerText="Entries: "+filtered.length;

    if(reportLineChart)reportLineChart.destroy();
    if(reportPieChart)reportPieChart.destroy();

    reportLineChart=new Chart(reportLine,{
        type:"line",
        data:{labels:filtered.map(e=>e.date),datasets:[{data:filtered.map(e=>e.amount)}]}
    });

    reportPieChart=new Chart(reportPie,{
        type:"pie",
        data:{labels:filtered.map(e=>e.category),datasets:[{data:filtered.map(e=>e.amount)}]}
    });
}

function toggleNotes(){
    notesModal.style.display=notesModal.style.display==="flex"?"none":"flex";
    notesArea.value=notes;
    generateInsights();
}

function saveNotes(){
    notes=notesArea.value;
    localStorage.setItem("notes",notes);
}

function generateInsights(){
    const last=expenses.slice(-5);
    let total=last.reduce((a,b)=>a+b.amount,0);
    autoNotes.innerHTML="Last 5 total: "+total;
}

const lineChartCanvas=document.getElementById("lineChart");
const pieChartCanvas=document.getElementById("pieChart");

render();
</script>

</body>
</html>
