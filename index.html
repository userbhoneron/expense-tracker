<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Expense Tracker Final</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    font-family:Arial,Helvetica,sans-serif;
    background:#f4f4f4;
    color:#222;
    padding:18px;
    transition:.25s;
}

body.dark{
    background:#121212;
    color:#eee;
}

.container{
    max-width:900px;
    margin:auto;
    background:#fff;
    padding:20px;
    border-radius:18px;
    box-shadow:0 8px 20px rgba(0,0,0,.08);
}

body.dark .container,
body.dark .box{
    background:#1f1f1f;
}

h1,h2,h3{
    margin-bottom:12px;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

input,select,textarea,button{
    width:100%;
    padding:10px;
    margin-top:8px;
    border-radius:10px;
    border:1px solid #ccc;
    font-size:14px;
}

body.dark input,
body.dark select,
body.dark textarea{
    background:#2a2a2a;
    color:#fff;
    border-color:#444;
}

button{
    cursor:pointer;
    border:none;
}

.primary{
    background:#2e7d32;
    color:#fff;
}

.danger{
    background:#d32f2f;
    color:#fff;
}

.item{
    background:#efefef;
    padding:10px;
    border-radius:12px;
    margin-top:10px;
    display:flex;
    justify-content:space-between;
    gap:10px;
}

body.dark .item{
    background:#2b2b2b;
}

.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.6);
    display:none;
    justify-content:center;
    align-items:center;
    padding:10px;
    z-index:20;
}

.box{
    background:#fff;
    width:100%;
    max-width:650px;
    max-height:90vh;
    overflow:auto;
    padding:18px;
    border-radius:16px;
}

.hidden{
    display:none;
}

/* Floating Buttons */

.fab{
    position:fixed;
    width:48px;
    height:48px;
    border-radius:50%;
    color:#fff;
    z-index:30;
}

#darkBtn{top:10px;right:10px;background:#2e7d32;}
#searchBtn{top:66px;right:10px;background:#43a047;}
#reportBtn{top:122px;right:10px;background:#1e88e5;}
#notesBtn{bottom:10px;right:10px;background:#fbc02d;color:#000;}
#backupBtn{top:50%;left:10px;transform:translateY(-50%);background:#6d4c41;}
#categoryBtn{bottom:10px;left:10px;background:#8e24aa;}

@media(max-width:700px){
    .grid{
        grid-template-columns:1fr;
    }
}

/* SCROLLABLE EXPENSE LIST */

#list{
    max-height: 420px;
    overflow-y: auto;
    padding-right: 6px;
    margin-top: 10px;
    border: 1px solid #ddd;
    border-radius: 14px;
    padding: 10px;
    background: rgba(0,0,0,0.03);
}

body.dark #list{
    border-color:#444;
    background: rgba(255,255,255,0.03);
}
</style>
</head>

<body>

<button id="darkBtn" class="fab">🌙</button>
<button id="searchBtn" class="fab">🔍</button>
<button id="reportBtn" class="fab">📊</button>
<button id="notesBtn" class="fab">📝</button>
<button id="backupBtn" class="fab">💾</button>
<button id="categoryBtn" class="fab">📂</button>

<div class="container">

<h1>Expense Tracker</h1>

<div id="searchArea" class="hidden">
<div class="grid">
<input id="searchInput" placeholder="Search">
<select id="filterCategory"></select>
</div>
</div>

<div class="grid">
<input id="name" placeholder="Name">
<input id="price" type="number" placeholder="Price">
</div>

<div class="grid">
<input id="date" type="date">
<select id="category"></select>
</div>

<input id="customCategory" class="hidden" placeholder="Custom Category">

<button id="saveBtn" class="primary">Add Expense</button>

<h3 id="totalText">Total: 0</h3>

<div id="list"></div>

<h3>Trend</h3>
<canvas id="lineChart"></canvas>

<h3>Category Breakdown</h3>
<canvas id="pieChart"></canvas>

</div>

<!-- NOTES -->

<div id="notesModal" class="modal">
<div class="box">
<h2>Notes</h2>
<textarea id="notesArea" rows="8"></textarea>
<button id="saveNotesBtn" class="primary">Save</button>
<button onclick="closeModal('notesModal')">Close</button>
</div>
</div>

<!-- BACKUP -->

<div id="backupModal" class="modal">
<div class="box">

<h2>Backup & Restore</h2>

<p>Current Saved JSON</p>
<textarea id="backupOutput" rows="8" readonly></textarea>

<p>Paste Your JSON</p>
<textarea id="restoreInput" rows="8"></textarea>

<button id="restoreBtn" class="primary">Submit JSON</button>
<button onclick="closeModal('backupModal')">Close</button>

</div>
</div>

<!-- CATEGORY -->

<div id="categoryModal" class="modal">
<div class="box">

<h2>Category Manager</h2>

<input id="newCategory" placeholder="New Category">
<button id="addCategoryBtn" class="primary">Add</button>

<div id="categoryList"></div>

<button onclick="closeModal('categoryModal')">Close</button>

</div>
</div>

<!-- REPORT -->

<div id="reportModal" class="modal">
<div class="box">

<h2>Report Generator</h2>

<input id="rName" placeholder="Name">

<div class="grid">
<input id="rMin" type="number" placeholder="Min Price">
<input id="rMax" type="number" placeholder="Max Price">
</div>

<div class="grid">
<input id="rFrom" type="date">
<input id="rTo" type="date">
</div>

<select id="rCategory"></select>

<button id="generateReportBtn" class="primary">Generate</button>

<div id="reportOutput"></div>

<canvas id="reportPie"></canvas>
<canvas id="reportLine"></canvas>

<button onclick="closeModal('reportModal')">Close</button>

</div>
</div>

<script>
const $ = id => document.getElementById(id);

let expenses =
JSON.parse(localStorage.getItem("expenses")) || [];

let notes =
localStorage.getItem("notes") || "";

let categories =
JSON.parse(localStorage.getItem("categories")) ||
["Food","Transport","Bills","Shopping","Entertainment","Other"];

let editIndex = -1;

let lineChart;
let pieChart;
let reportPie;
let reportLine;

/* SAVE */

function saveAll(){
    localStorage.setItem("expenses",
    JSON.stringify(expenses));

    localStorage.setItem("notes",notes);

    localStorage.setItem("categories",
    JSON.stringify(categories));
}

/* MODAL */

function closeModal(id){
    $(id).style.display="none";
}
window.closeModal=closeModal;

/* CATEGORY LOAD */

function loadCategories(){

    $("category").innerHTML="";
    $("filterCategory").innerHTML=
    '<option value="">All</option>';

    $("rCategory").innerHTML=
    '<option value="">All</option>';

    categories.forEach(cat=>{

        $("category").innerHTML+=
        `<option>${cat}</option>`;

        $("filterCategory").innerHTML+=
        `<option>${cat}</option>`;

        $("rCategory").innerHTML+=
        `<option>${cat}</option>`;
    });
}

/* TOGGLE CUSTOM */

$("category").onchange=()=>{
    $("customCategory").classList.toggle(
        "hidden",
        $("category").value!=="Other"
    );
};

/* CLEAR */

function clearForm(){
    $("name").value="";
    $("price").value="";
    $("date").value="";
    $("customCategory").value="";
    $("saveBtn").innerText="Add Expense";
    editIndex=-1;
}

/* ADD */

$("saveBtn").onclick=()=>{

    let cat=$("category").value;

    if(cat==="Other"){
        cat=$("customCategory").value.trim();

        if(!cat){
            alert("Enter custom category");
            return;
        }

        if(!categories.includes(cat)){
            categories.splice(
                categories.length-1,
                0,
                cat
            );
        }
    }

    const item={
        name:$("name").value.trim(),
        price:+$("price").value,
        date:$("date").value,
        category:cat
    };

    if(!item.name||!item.price||!item.date){
        alert("Fill all fields");
        return;
    }

    if(editIndex===-1){
        expenses.push(item);
    }else{
        expenses[editIndex]=item;
    }

    saveAll();
    loadCategories();
    clearForm();
    render();
};

/* EDIT */

function editExpense(i){

    const x=expenses[i];

    $("name").value=x.name;
    $("price").value=x.price;
    $("date").value=x.date;

    if(categories.includes(x.category)){
        $("category").value=x.category;
    }else{
        $("category").value="Other";
        $("customCategory").value=x.category;
    }

    $("category").onchange();

    editIndex=i;

    $("saveBtn").innerText=
    "Save Changes";
}
window.editExpense=editExpense;

/* DELETE */

function deleteExpense(i){

    if(confirm("Delete expense?")){
        expenses.splice(i,1);
        saveAll();
        render();
    }
}
window.deleteExpense=deleteExpense;

/* RENDER */

function render(){

    let total=0;

    const text=
    $("searchInput").value.toLowerCase();

    const cat=
    $("filterCategory").value;

    $("list").innerHTML="";

    expenses.forEach((x,i)=>{

        if(text &&
          !(x.name+" "+x.category)
          .toLowerCase()
          .includes(text)) return;

        if(cat && x.category!==cat)
            return;

        total+=x.price;

        $("list").innerHTML+=`
        <div class="item">
            <div>
                <b>${x.name}</b><br>
                ${x.date} • ${x.category}
            </div>
            <div>
                ${x.price}
                <button onclick="editExpense(${i})">Edit</button>
                <button class="danger"
                onclick="deleteExpense(${i})">
                Del
                </button>
            </div>
        </div>`;
    });

    $("totalText").innerText=
    "Total: "+total;

    drawCharts();
}

/* CHARTS */

function drawCharts(){

    const byDate={};
    const byCat={};

    expenses.forEach(x=>{
        byDate[x.date]=(byDate[x.date]||0)+x.price;
        byCat[x.category]=(byCat[x.category]||0)+x.price;
    });

    if(lineChart) lineChart.destroy();
    if(pieChart) pieChart.destroy();

    lineChart=new Chart($("lineChart"),{
        type:"line",
        data:{
            labels:Object.keys(byDate),
            datasets:[{
                data:Object.values(byDate)
            }]
        }
    });

    pieChart=new Chart($("pieChart"),{
        type:"pie",
        data:{
            labels:Object.keys(byCat),
            datasets:[{
                data:Object.values(byCat)
            }]
        }
    });
}

/* FLOATING BUTTONS */

$("darkBtn").onclick=()=>{
    document.body.classList.toggle("dark");
};

$("searchBtn").onclick=()=>{
    $("searchArea").classList.toggle("hidden");
};

$("notesBtn").onclick=()=>{
    $("notesArea").value=notes;
    $("notesModal").style.display="flex";
};

$("reportBtn").onclick=()=>{
    $("reportModal").style.display="flex";
};

$("backupBtn").onclick=()=>{
    $("backupOutput").value=
    JSON.stringify(expenses,null,2);

    $("restoreInput").value="";
    $("backupModal").style.display="flex";
};

$("categoryBtn").onclick=()=>{
    $("categoryModal").style.display="flex";
    renderCategoryList();
};

/* NOTES */

$("saveNotesBtn").onclick=()=>{
    notes=$("notesArea").value;
    saveAll();
    closeModal("notesModal");
};

/* BACKUP */

$("restoreBtn").onclick = () => {

    try {

        const data = JSON.parse(
            $("restoreInput").value
        );

        if (!Array.isArray(data))
            throw 0;

        const replace = confirm(
            "OK = Replace All\nCancel = Add"
        );

        expenses = replace
            ? data
            : [...expenses, ...data];

        /* ADD MISSING CUSTOM CATEGORIES */
        data.forEach(item => {

            if (
                item.category &&
                !categories.includes(item.category)
            ) {
                categories.splice(
                    categories.length - 1,
                    0,
                    item.category
                );
            }

        });

        saveAll();
        loadCategories();
        renderCategoryList();
        render();

        closeModal("backupModal");

    } catch {

        alert("Invalid JSON");

    }

};
/* CATEGORY */

$("addCategoryBtn").onclick=()=>{

    const val=
    $("newCategory").value.trim();

    if(!val) return;

    if(categories.includes(val)){
        alert("Already exists");
        return;
    }

    categories.push(val);

    $("newCategory").value="";

    saveAll();
    loadCategories();
    renderCategoryList();
};

function renderCategoryList(){

    $("categoryList").innerHTML="";

    categories
    .filter(x=>x!=="Other")
    .forEach(cat=>{

        $("categoryList").innerHTML+=`
        <div class="item">
            <div>${cat}</div>
            <div>
                <button class="danger"
                onclick="removeCat('${cat}')">
                Delete
                </button>
            </div>
        </div>`;
    });
}

function removeCat(cat){

    if(expenses.some(x=>x.category===cat)){
        alert("Used in expenses");
        return;
    }

    categories=
    categories.filter(x=>x!==cat);

    saveAll();
    loadCategories();
    renderCategoryList();
}
window.removeCat=removeCat;

/* REPORT */

$("generateReportBtn").onclick=()=>{

    const name=
    $("rName").value.toLowerCase();

    const min=
    +$("rMin").value || 0;

    const max=
    +$("rMax").value || Infinity;

    const from=
    $("rFrom").value;

    const to=
    $("rTo").value;

    const cat=
    $("rCategory").value;

    const f=
    expenses.filter(x=>{

        return (!name ||
        x.name.toLowerCase()
        .includes(name))

        && x.price>=min
        && x.price<=max

        && (!from ||
        x.date>=from)

        && (!to ||
        x.date<=to)

        && (!cat ||
        x.category===cat);
    });

    const total=
    f.reduce((a,b)=>a+b.price,0);

    $("reportOutput").innerHTML=
    "Entries: "+f.length+
    "<br>Total: "+total;

    const byDate={};
    const byCat={};

    f.forEach(x=>{
        byDate[x.date]=(byDate[x.date]||0)+x.price;
        byCat[x.category]=(byCat[x.category]||0)+x.price;
    });

    if(reportPie) reportPie.destroy();
    if(reportLine) reportLine.destroy();

    reportPie=new Chart($("reportPie"),{
        type:"pie",
        data:{
            labels:Object.keys(byCat),
            datasets:[{
                data:Object.values(byCat)
            }]
        }
    });

    reportLine=new Chart($("reportLine"),{
        type:"line",
        data:{
            labels:Object.keys(byDate),
            datasets:[{
                data:Object.values(byDate)
            }]
        }
    });
};

/* SEARCH FIX */

$("searchInput").addEventListener("input", () => {
    render();
});

$("filterCategory").addEventListener("change", () => {
    render();
});

/* INIT */

loadCategories();
render();

/* INIT */

loadCategories();
render();
</script>

</body>
</html>
