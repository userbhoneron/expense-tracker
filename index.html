<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Tracker</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: Arial;
    background: #f4f4f4;
    transition: 0.3s;
}

body.dark {
    background: #121212;
    color: #eee;
}

.container {
    max-width: 520px;
    width: 95%;
    margin: 20px auto;
    background: white;
    padding: 15px;
    border-radius: 12px;
}

body.dark .container {
    background: #1e1e1e;
}

input, select {
    width: 100%;
    padding: 10px;
    margin-top: 6px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

body.dark input,
body.dark select {
    background: #2c2c2c;
    color: white;
    border: 1px solid #444;
}

button {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.expense {
    display: flex;
    justify-content: space-between;
    background: #f1f1f1;
    padding: 8px;
    margin-top: 6px;
    border-radius: 6px;
}

body.dark .expense {
    background: #2a2a2a;
}

.total {
    text-align: right;
    font-weight: bold;
    margin-top: 10px;
}

canvas {
    width: 100% !important;
    height: 240px !important;
}

/* SEARCH PANEL */
.searchBox {
    display: none;
    margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="container">
    <h2>Expense Tracker</h2>

    <button onclick="toggleDark()">🌙 Toggle Dark Mode</button>
    <button onclick="toggleSearch()">🔍 Search</button>

    <div class="searchBox" id="searchBox">
        <input id="searchInput" placeholder="Search...">
    </div>

    <input id="name" placeholder="Name">
    <input id="amount" type="number" placeholder="Amount">
    <input id="date" type="date">

    <select id="category" onchange="handleCategory()">
        <option value="">Category</option>
        <option>Food</option>
        <option>Transport</option>
        <option>Shopping</option>
        <option>Bills</option>
        <option>Entertainment</option>
        <option>Other</option>
    </select>

    <input id="customCategory" placeholder="Custom Category (optional)" disabled>

    <button onclick="addExpense()">Add Expense</button>

    <div id="list"></div>
    <div class="total" id="total"></div>

    <h4>Trend</h4>
    <canvas id="lineChart"></canvas>

    <h4>Category Breakdown</h4>
    <canvas id="pieChart"></canvas>
</div>

<script>
let expenses = JSON.parse(localStorage.getItem("expenses")) || [];

// clean data
expenses = expenses.map(e => ({
    name: e.name || "Unknown",
    amount: Number(e.amount) || 0,
    date: e.date || "",
    category: e.category || "Other"
}));

let editingIndex = null;
let lineChart, pieChart;

/* DARK MODE */
function toggleDark() {
    document.body.classList.toggle("dark");
    localStorage.setItem("darkMode", document.body.classList.contains("dark"));
}

if (localStorage.getItem("darkMode") === "true") {
    document.body.classList.add("dark");
}

/* SEARCH TOGGLE */
function toggleSearch() {
    const box = document.getElementById("searchBox");
    box.style.display = box.style.display === "block" ? "none" : "block";
}

/* CATEGORY */
function handleCategory() {
    const cat = category.value;
    customCategory.disabled = cat !== "Other";
}

/* ADD */
function addExpense() {
    const name = nameInput.value.trim();
    const amount = parseFloat(amountInput.value);
    const date = dateInput.value;
    const cat = category.value;
    const custom = customCategory.value.trim();

    if (!name || isNaN(amount) || !date || !cat) {
        alert("Fill all fields");
        return;
    }

    const finalCat = (cat === "Other" && custom) ? custom : cat;

    if (editingIndex !== null) {
        expenses[editingIndex] = { name, amount, date, category: finalCat };
        editingIndex = null;
    } else {
        expenses.push({ name, amount, date, category: finalCat });
    }

    save();
    clearInputs();
    render();
}

/* SAVE */
function save() {
    localStorage.setItem("expenses", JSON.stringify(expenses));
}

/* CLEAR */
function clearInputs() {
    nameInput.value = "";
    amountInput.value = "";
    dateInput.value = "";
    category.value = "";
    customCategory.value = "";
    customCategory.disabled = true;
}

/* DELETE */
function deleteExpense(i) {
    expenses.splice(i, 1);
    save();
    render();
}

/* EDIT */
function editExpense(i) {
    const e = expenses[i];
    nameInput.value = e.name;
    amountInput.value = e.amount;
    dateInput.value = e.date;
    category.value = e.category;
    editingIndex = i;
}

/* RENDER */
function render() {
    const list = document.getElementById("list");
    const total = document.getElementById("total");
    const search = document.getElementById("searchInput").value?.toLowerCase() || "";

    list.innerHTML = "";
    let sum = 0;

    expenses.forEach((e, i) => {
        if (search && !(e.name.toLowerCase().includes(search) || e.category.toLowerCase().includes(search))) return;

        sum += e.amount;

        const div = document.createElement("div");
        div.className = "expense";

        div.innerHTML = `
            <div>
                <b>${e.name}</b><br>
                <small>${e.date} • ${e.category}</small>
            </div>
            <div>
                ${e.amount.toFixed(2)}
                <button onclick="editExpense(${i})">Edit</button>
                <button onclick="deleteExpense(${i})">X</button>
            </div>
        `;

        list.appendChild(div);
    });

    total.innerText = "Total: " + sum.toFixed(2);
    drawCharts();
}

/* CHARTS */
function drawCharts() {
    const dateMap = {};
    const catMap = {};

    expenses.forEach(e => {
        dateMap[e.date] = (dateMap[e.date] || 0) + e.amount;
        catMap[e.category] = (catMap[e.category] || 0) + e.amount;
    });

    const dates = Object.keys(dateMap).sort();
    const values = dates.map(d => dateMap[d]);

    if (lineChart) lineChart.destroy();
    if (pieChart) pieChart.destroy();

    lineChart = new Chart(lineChartCtx, {
        type: "line",
        data: {
            labels: dates,
            datasets: [{
                data: values,
                borderColor: "green",
                backgroundColor: "rgba(0,128,0,0.2)",
                fill: true,
                tension: 0.3
            }]
        }
    });

    pieChart = new Chart(pieChartCtx, {
        type: "pie",
        data: {
            labels: Object.keys(catMap),
            datasets: [{
                data: Object.values(catMap)
            }]
        }
    });
}

/* SEARCH LIVE */
searchInput.oninput = render;

/* INIT */
const lineChartCtx = document.getElementById("lineChart").getContext("2d");
const pieChartCtx = document.getElementById("pieChart").getContext("2d");

render();
</script>

</body>
</html>
