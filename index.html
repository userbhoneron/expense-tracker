<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Tracker</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:#f4f4f4;transition:.3s}
body.dark{background:#121212;color:#eee}

.container{
    max-width:520px;width:95%;margin:20px auto;
    background:white;padding:15px;border-radius:12px;
}
body.dark .container{background:#1e1e1e}

input,select,textarea{
    width:100%;padding:10px;margin-top:6px;
    border-radius:8px;border:1px solid #ccc;
}

button{cursor:pointer;transition:.2s}
button:active{transform:scale(.95)}

.add{background:#66bb6a;color:white;padding:12px;border:none;border-radius:8px;width:100%}
.closeBtn{background:#1e88e5;color:white;border:none;padding:10px;border-radius:8px;width:100%}
.saveBtn{background:#43a047;color:white;border:none;padding:12px;border-radius:8px;width:100%}
.saveBtn:active{background:#2e7d32}

.editBtn{background:#fbc02d;border:none;padding:5px}
.deleteBtn{background:#e53935;color:white;border:none;padding:5px}

/* FAB */
.fab{position:fixed;right:15px;width:45px;height:45px;border-radius:50%;border:none;}
#darkBtn{top:15px;background:#2e7d32;color:white}
#searchBtn{top:70px;background:#43a047;color:white}
#reportBtn{top:125px;background:#1e88e5;color:white}
#notesBtn{bottom:20px;background:#fbc02d}

/* Search */
#searchBox{display:none}

.section-title{
    margin-top:15px;
    font-weight:bold;
    font-size:14px;
    opacity:0.8;
}

.divider{
    height:1px;
    background:#ddd;
    margin:15px 0;
}

body.dark .divider{
    background:#444;
}

/* Expense */
.expense{
    background:#f1f1f1;margin-top:8px;padding:10px;border-radius:10px;
    display:flex;justify-content:space-between;
}
body.dark .expense{background:#2a2a2a}

/* Modal */
.modal{
    position:fixed;top:0;left:0;width:100%;height:100%;
    background:rgba(0,0,0,.6);display:none;
    justify-content:center;align-items:center;padding:10px;
}
.box{
    background:white;width:100%;max-width:600px;
    max-height:90vh;overflow:auto;padding:15px;border-radius:12px;
}
body.dark .box{background:#1e1e1e}

canvas{width:100%!important}
</style>
</head>

<body>

<button id="darkBtn" class="fab">🌙</button>
<button id="searchBtn" class="fab">🔍</button>
<button id="reportBtn" class="fab">📊</button>
<button id="notesBtn" class="fab">📝</button>

<div class="container">

<h2>Expense Tracker</h2>

<div id="searchBox">

<div class="section-title">🔍 Search & Filters</div>

<input id="searchInput" placeholder="Search">

<select id="filterCategory"></select>
<input id="fromDate" type="date">
<input id="toDate" type="date">
<input id="minAmount" type="number" placeholder="Min">
<input id="maxAmount" type="number" placeholder="Max">

</div>

<div class="divider"></div>

<div class="section-title">➕ Add Expense</div>

<input id="name" placeholder="Name">
<input id="amount" type="number" placeholder="Amount">
<input id="date" type="date">

<select id="category"></select>
<input id="customCategory" placeholder="Custom Category" disabled>

<button class="add" id="addBtn">Add Expense</button>

<div id="list"></div>
<div id="total"></div>

<h4>Trend</h4>
<canvas id="lineChart"></canvas>

<h4>Category Breakdown</h4>
<canvas id="pieChart"></canvas>

</div>

<!-- REPORT -->
<div id="reportModal" class="modal">
<div class="box">
<h3>Report</h3>

<input id="rFrom" type="date">
<input id="rTo" type="date">
<select id="rCategory"></select>
<input id="rMin" type="number" placeholder="Min">
<input id="rMax" type="number" placeholder="Max">

<button class="add" id="genReport">Generate</button>

<div id="reportOutput"></div>

<canvas id="reportLine"></canvas>
<canvas id="reportPie"></canvas>

<button class="closeBtn" id="closeReport">Close</button>
</div>
</div>

<!-- NOTES -->
<div id="notesModal" class="modal">
<div class="box">
<h3>Notes & Insights</h3>

<textarea id="notesArea"></textarea>
<button class="saveBtn" id="saveNotes">Save Notes</button>

<hr>
<div id="autoNotes"></div>

<button class="closeBtn" id="closeNotes">Close</button>
</div>
</div>

<script>
const $=id=>document.getElementById(id);

let expenses=JSON.parse(localStorage.getItem("expenses"))||[];
let notes=localStorage.getItem("notes")||"";
let customCats=JSON.parse(localStorage.getItem("customCats"))||[
"Food","Transport","Shopping","Bills","Entertainment","Other"
];

let editIndex=-1;
let lineChart,pieChart,reportLineChart,reportPieChart;

/* DARK MODE */
if(localStorage.getItem("darkMode")==="on") document.body.classList.add("dark");
$("darkBtn").onclick=()=>{
    document.body.classList.toggle("dark");
    localStorage.setItem("darkMode",
    document.body.classList.contains("dark")?"on":"off");
};

/* CATEGORY LOAD */
function loadCategoryDropdown(){
    $("category").innerHTML="";
    customCats.forEach(c=>{
        $("category").innerHTML+=`<option>${c}</option>`;
    });
}
loadCategoryDropdown();

/* CATEGORY CHANGE */
$("category").onchange=()=>{
    const isOther=$("category").value==="Other";
    $("customCategory").disabled=!isOther;
    if(!isOther) $("customCategory").value="";
};

/* ADD / UPDATE */
$("addBtn").onclick=()=>{
    const name=$("name").value.trim();
    const amount=+$("amount").value;
    const date=$("date").value;
    let cat=$("category").value;
    const custom=$("customCategory").value.trim();

    if(cat==="Other"){
        if(!custom){alert("Enter custom category");return;}
        cat=custom;

        if(!customCats.includes(custom)){
            customCats.push(custom);
            localStorage.setItem("customCats",JSON.stringify(customCats));
            loadCategoryDropdown();
        }
    }

    if(!name||!amount||!date){alert("Fill all");return;}

    if(editIndex===-1){
        expenses.push({name,amount,date,category:cat});
    }else{
        expenses[editIndex]={name,amount,date,category:cat};
        editIndex=-1;
        $("addBtn").innerText="Add Expense";
    }

    localStorage.setItem("expenses",JSON.stringify(expenses));

    $("name").value="";
    $("amount").value="";
    $("date").value="";
    $("customCategory").value="";
    $("category").value=customCats[0];

    render();
};

/* EDIT */
function editExpense(i){
    const e=expenses[i];

    $("name").value=e.name;
    $("amount").value=e.amount;
    $("date").value=e.date;

    if(customCats.includes(e.category)){
        $("category").value=e.category;
        $("customCategory").disabled=true;
    }else{
        $("category").value="Other";
        $("customCategory").disabled=false;
        $("customCategory").value=e.category;
    }

    editIndex=i;
    $("addBtn").innerText="Update Expense";
}

/* DELETE */
function deleteExpense(i){
    if(confirm("Delete?")){
        expenses.splice(i,1);
        localStorage.setItem("expenses",JSON.stringify(expenses));
        render();
    }
}

/* SEARCH */
$("searchBtn").onclick=()=>{
    const box=$("searchBox");
    box.style.display=box.style.display==="block"?"none":"block";
    if(box.style.display==="none"){
        $("searchInput").value="";
        render();
    }
};
$("searchInput").oninput=render;

/* RENDER */
function render(){
    let html="",sum=0;

    const text=$("searchInput").value.toLowerCase();
    const cat=$("filterCategory").value;
    const from=$("fromDate").value;
    const to=$("toDate").value;
    const min=+$("minAmount").value||0;
    const max=+$("maxAmount").value||Infinity;

    expenses.forEach((e,i)=>{
        const match=
        (!text||e.name.toLowerCase().includes(text)||e.category.toLowerCase().includes(text))&&
        (!cat||e.category===cat)&&
        (!from||e.date>=from)&&
        (!to||e.date<=to)&&
        (e.amount>=min&&e.amount<=max);

        if(!match)return;

        sum+=e.amount;

        html+=`
        <div class="expense">
            <div><b>${e.name}</b><br>${e.date} • ${e.category}</div>
            <div>
                ${e.amount}
                <button class="editBtn" onclick="editExpense(${i})">Edit</button>
                <button class="deleteBtn" onclick="deleteExpense(${i})">Del</button>
            </div>
        </div>`;
    });

    $("list").innerHTML=html;
    $("total").innerText="Total: "+sum;

    loadFilters();
    drawCharts();
}

/* FILTERS */
function loadFilters(){
    $("filterCategory").innerHTML='<option value="">All</option>';
    $("rCategory").innerHTML='<option value="">All</option>';

    customCats.forEach(c=>{
        $("filterCategory").innerHTML+=`<option>${c}</option>`;
        $("rCategory").innerHTML+=`<option>${c}</option>`;
    });
}

/* CHARTS */
function drawCharts(){
    const d={},c={};

    expenses.forEach(e=>{
        d[e.date]=(d[e.date]||0)+e.amount;
        c[e.category]=(c[e.category]||0)+e.amount;
    });

    const dates=Object.keys(d).sort();
    const cats=Object.keys(c).sort();

    if(lineChart)lineChart.destroy();
    if(pieChart)pieChart.destroy();

    lineChart=new Chart($("lineChart"),{
        type:"line",
        data:{labels:dates,datasets:[{data:dates.map(x=>d[x])}]}
    });

    pieChart=new Chart($("pieChart"),{
        type:"pie",
        data:{labels:cats,datasets:[{data:cats.map(x=>c[x])}]}
    });
}

/* REPORT */
$("reportBtn").onclick=()=>{$("reportModal").style.display="flex"};
$("closeReport").onclick=()=>{$("reportModal").style.display="none"};

$("genReport").onclick=()=>{
    const f=expenses.filter(e=>{
        return (!$("rFrom").value||e.date>=$("rFrom").value)&&
               (!$("rTo").value||e.date<=$("rTo").value)&&
               (!$("rCategory").value||e.category===$("rCategory").value)&&
               (e.amount>=(+$("rMin").value||0))&&
               (e.amount<=(+$("rMax").value||Infinity));
    });

    const last5=f.slice(-5);
    const total5=last5.reduce((a,b)=>a+b.amount,0);

    $("reportOutput").innerHTML=`Entries: ${f.length}<br>Last 5 total: ${total5}`;

    const d={},c={};
    f.forEach(e=>{
        d[e.date]=(d[e.date]||0)+e.amount;
        c[e.category]=(c[e.category]||0)+e.amount;
    });

    if(reportLineChart)reportLineChart.destroy();
    if(reportPieChart)reportPieChart.destroy();

    reportLineChart=new Chart($("reportLine"),{
        type:"line",
        data:{labels:Object.keys(d),datasets:[{data:Object.values(d)}]}
    });

    reportPieChart=new Chart($("reportPie"),{
        type:"pie",
        data:{labels:Object.keys(c),datasets:[{data:Object.values(c)}]}
    });
};

/* NOTES */
$("notesBtn").onclick=()=>{
    $("notesModal").style.display="flex";
    $("notesArea").value=notes;
    generateInsights();
};

$("saveNotes").onclick=()=>{
    notes=$("notesArea").value;
    localStorage.setItem("notes",notes);
    $("saveNotes").innerText="Saved ✓";
    setTimeout(()=>$("saveNotes").innerText="Save Notes",1000);
};

$("closeNotes").onclick=()=>{$("notesModal").style.display="none"};

function generateInsights(){
    const last5=expenses.slice(-5);
    const prev5=expenses.slice(-10,-5);

    const l=last5.reduce((a,b)=>a+b.amount,0);
    const p=prev5.reduce((a,b)=>a+b.amount,0);

    let msg=`Last 5 total: ${l}<br>`;
    if(prev5.length){
        const diff=l-p;
        msg+=`Previous: ${p}<br>`;
        msg+=diff>0?`📈 +${diff}`:diff<0?`📉 -${Math.abs(diff)}`:`No change`;
    }

    $("autoNotes").innerHTML=msg;
}

render();
</script>

</body>
</html>
