<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Expense Tracker Pro</title>

<!-- Chart.js CDN -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: Arial;
    background: #f4f4f4;
}

.container {
    max-width: 520px;
    margin: 20px auto;
    background: white;
    padding: 15px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

h2 { margin-top: 0; }

input {
    width: 100%;
    padding: 10px;
    margin-top: 6px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
}

.add { background: #28a745; color: white; }

.expense {
    display: flex;
    justify-content: space-between;
    background: #f1f1f1;
    padding: 8px;
    margin-top: 6px;
    border-radius: 6px;
}

.del {
    background: #dc3545;
    color: white;
    border: none;
    padding: 5px 8px;
    border-radius: 5px;
    cursor: pointer;
}

.edit {
    background: #ffc107;
    border: none;
    padding: 5px 8px;
    border-radius: 5px;
    cursor: pointer;
    margin-right: 5px;
}

.total {
    text-align: right;
    font-weight: bold;
    margin-top: 10px;
}

.graph {
    margin-top: 15px;
}

canvas {
    width: 100% !important;
    height: 260px !important;
}
</style>
</head>

<body>

<div class="container">
    <h2>Expense Tracker</h2>

    <input id="name" placeholder="Name">
    <input id="amount" type="number" placeholder="Amount">
    <input id="date" type="date">

    <button class="add" onclick="addExpense()">Add Expense</button>

    <div id="list"></div>
    <div class="total" id="total"></div>

    <div class="graph">
        <canvas id="graph"></canvas>
    </div>
</div>

<script>
let expenses = JSON.parse(localStorage.getItem("expenses")) || [];

// 🔥 CLEAN BAD DATA
expenses = expenses.map(e => ({
    name: e.name || "Unknown",
    amount: Number(e.amount) || 0,
    date: e.date || ""
}));

let editingIndex = null;
let chart;

/* SAVE */
function save() {
    localStorage.setItem("expenses", JSON.stringify(expenses));
}

/* ADD / EDIT */
function addExpense() {
    const name = document.getElementById("name").value.trim();
    const amount = parseFloat(document.getElementById("amount").value);
    const date = document.getElementById("date").value;

    if (!name || isNaN(amount) || !date) {
        alert("Please fill all fields correctly");
        return;
    }

    if (editingIndex !== null) {
        expenses[editingIndex] = { name, amount, date };
        editingIndex = null;
    } else {
        expenses.push({ name, amount, date });
    }

    save();
    clearInputs();
    render();
}

/* CLEAR INPUTS */
function clearInputs() {
    document.getElementById("name").value = "";
    document.getElementById("amount").value = "";
    document.getElementById("date").value = "";
}

/* DELETE */
function deleteExpense(i) {
    expenses.splice(i, 1);
    save();
    render();
}

/* EDIT */
function editExpense(i) {
    const e = expenses[i];
    document.getElementById("name").value = e.name;
    document.getElementById("amount").value = e.amount;
    document.getElementById("date").value = e.date;
    editingIndex = i;
}

/* RENDER */
function render() {
    const list = document.getElementById("list");
    const total = document.getElementById("total");

    list.innerHTML = "";

    let sum = 0;

    expenses.forEach((e, i) => {
        sum += e.amount;

        const div = document.createElement("div");
        div.className = "expense";

        div.innerHTML = `
            <div>
                <b>${e.name}</b><br>
                <small>${e.date}</small>
            </div>
            <div>
                ${e.amount.toFixed(2)}
                <button class="edit" onclick="editExpense(${i})">Edit</button>
                <button class="del" onclick="deleteExpense(${i})">X</button>
            </div>
        `;

        list.appendChild(div);
    });

    total.innerText = "Total: " + sum.toFixed(2);

    drawGraph();
}

/* GRAPH (Chart.js) */
function drawGraph() {
    const ctx = document.getElementById("graph").getContext("2d");

    if (chart) chart.destroy();

    if (expenses.length === 0) return;

    // 🔥 GROUP SAME DATES
    const grouped = {};
    expenses.forEach(e => {
        if (!grouped[e.date]) grouped[e.date] = 0;
        grouped[e.date] += Number(e.amount);
    });

    const dates = Object.keys(grouped).sort();
    const values = dates.map(d => grouped[d]);

    chart = new Chart(ctx, {
        type: "line",
        data: {
            labels: dates,
            datasets: [{
                data: values,
                borderColor: "green",
                backgroundColor: "rgba(0,128,0,0.2)",
                tension: 0.3,
                fill: true,
                pointRadius: 5,
                pointBackgroundColor: "green"
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { display: false }
            },
            scales: {
                x: {
                    title: {
                        display: true,
                        text: "Date"
                    }
                },
                y: {
                    title: {
                        display: true,
                        text: "Amount"
                    },
                    beginAtZero: true
                }
            }
        }
    });
}

/* INIT */
render();
</script>

</body>
</html>
