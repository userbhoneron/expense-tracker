<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Tracker</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: Arial;
    background: #f4f4f4;
    transition: 0.3s;
}

body.dark {
    background: #121212;
    color: #eee;
}

.container {
    max-width: 520px;
    width: 95%;
    margin: 20px auto;
    background: white;
    padding: 15px;
    border-radius: 12px;
}

body.dark .container {
    background: #1e1e1e;
}

input, select {
    width: 100%;
    padding: 12px;
    margin-top: 6px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

body.dark input, body.dark select {
    background: #2c2c2c;
    color: white;
    border: 1px solid #444;
}

/* BUTTON */
.add {
    width: 100%;
    padding: 12px;
    margin-top: 8px;
    border: none;
    border-radius: 8px;
    background: #66bb6a;
    color: white;
    font-weight: bold;
}

/* FLOATING */
.fab {
    position: fixed;
    right: 15px;
    width: 45px;
    height: 45px;
    border-radius: 50%;
    border: none;
}

#darkBtn { top: 15px; background: #2e7d32; color: white; }
#searchBtn { top: 70px; background: #43a047; color: white; }

.searchBox {
    display: none;
    margin-bottom: 10px;
}

/* SWIPE SLOT */
.expense-wrapper {
    position: relative;
    height: 60px;
    margin-top: 8px;
    overflow: hidden;
    border-radius: 10px;
}

.delete-bg {
    position: absolute;
    right: 0;
    top: 0;
    width: 80px;
    height: 100%;
    background: #dc3545;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: bold;
}

.expense {
    position: absolute;
    width: 100%;
    height: 100%;
    background: #f1f1f1;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px;
    transition: transform 0.2s ease;
    touch-action: pan-y;
}

body.dark .expense {
    background: #2a2a2a;
}

.total {
    text-align: right;
    font-weight: bold;
    margin-top: 10px;
}

canvas {
    width: 100% !important;
    max-height: 260px;
}
</style>
</head>

<body>

<button id="darkBtn" class="fab" onclick="toggleDark()">🌙</button>
<button id="searchBtn" class="fab" onclick="toggleSearch()">🔍</button>

<div class="container">

<h2>Expense Tracker</h2>

<div class="searchBox" id="searchBox">
    <input id="searchInput" placeholder="Search...">
</div>

<input id="name" placeholder="Name">
<input id="amount" type="number" placeholder="Amount">
<input id="date" type="date">

<select id="category" onchange="handleCategory()"></select>
<input id="customCategory" placeholder="Custom Category" disabled>

<button class="add" onclick="addExpense()">Add Expense</button>

<div id="list"></div>
<div class="total" id="total"></div>

<h4>Trend</h4>
<canvas id="lineChart"></canvas>

<h4>Category Breakdown</h4>
<canvas id="pieChart"></canvas>

</div>

<script>
let expenses = JSON.parse(localStorage.getItem("expenses")) || [];
let customCategories = JSON.parse(localStorage.getItem("customCategories")) || [];

let lineChart, pieChart;

/* LOAD CATEGORIES */
function loadCategories(){
    const base=["Food","Transport","Shopping","Bills","Entertainment","Other"];
    const sel=document.getElementById("category");

    sel.innerHTML="";

    base.forEach(c=>sel.innerHTML+=`<option>${c}</option>`);

    if(customCategories.length){
        sel.innerHTML+=`<option disabled>──── Custom ────</option>`;
        customCategories.forEach(c=>{
            sel.innerHTML+=`<option>${c}</option>`;
        });
    }
}
loadCategories();

/* DARK */
function toggleDark(){
    document.body.classList.toggle("dark");
}

/* SEARCH */
function toggleSearch(){
    searchBox.style.display = searchBox.style.display==="block"?"none":"block";
}

/* CATEGORY */
function handleCategory(){
    customCategory.disabled = category.value !== "Other";
}

/* ADD */
function addExpense(){
    const name=document.getElementById("name").value;
    const amount=+document.getElementById("amount").value;
    const date=document.getElementById("date").value;
    const cat=category.value;
    const custom=customCategory.value;

    if(!name||!amount||!date||!cat) return alert("Fill all");

    let finalCat=cat;

    if(cat==="Other"&&custom){
        finalCat=custom;

        if(!customCategories.includes(custom)){
            customCategories.push(custom);
            localStorage.setItem("customCategories",JSON.stringify(customCategories));
            loadCategories();
        }
    }

    expenses.push({name,amount,date,category:finalCat});
    localStorage.setItem("expenses",JSON.stringify(expenses));

    clearInputs();
    render();
}

/* CLEAR */
function clearInputs(){
    name.value="";
    amount.value="";
    date.value="";
    category.value="";
    customCategory.value="";
    customCategory.disabled=true;
}

/* DELETE */
function deleteExpense(i){
    expenses.splice(i,1);
    localStorage.setItem("expenses",JSON.stringify(expenses));
    render();
}

/* SWIPE */
let startX=0,currentX=0,active=null;

function attachSwipe(el,i){
    const card=el.querySelector(".expense");

    card.addEventListener("touchstart",e=>{
        startX=e.touches[0].clientX;
        active=card;
    });

    card.addEventListener("touchmove",e=>{
        if(!active)return;
        let diff=e.touches[0].clientX-startX;
        if(diff<0) card.style.transform=`translateX(${diff}px)`;
    });

    card.addEventListener("touchend",()=>{
        card.style.transform="translateX(0px)";
        active=null;
    });
}

/* RENDER (SAFE SEARCH FIXED) */
function render(){
    const list=document.getElementById("list");
    const total=document.getElementById("total");
    const searchEl=document.getElementById("searchInput");

    const search=(searchEl?searchEl.value:"").toLowerCase();

    list.innerHTML="";
    let sum=0;

    expenses.forEach((e,i)=>{

        const match=
        (e.name||"").toLowerCase().includes(search)||
        (e.category||"").toLowerCase().includes(search)||
        (e.date||"").includes(search);

        if(search&&!match)return;

        sum+=e.amount;

        const wrap=document.createElement("div");
        wrap.className="expense-wrapper";

        wrap.innerHTML=`
            <div class="delete-bg" onclick="deleteExpense(${i})">X</div>
            <div class="expense">
                <div>
                    <b>${e.name}</b><br>
                    <small>${e.date} • ${e.category}</small>
                </div>
                <div>${e.amount.toFixed(2)}</div>
            </div>
        `;

        list.appendChild(wrap);
        attachSwipe(wrap,i);
    });

    total.innerText="Total: "+sum.toFixed(2);

    drawCharts();
}

/* CHARTS (LINE = DATE ONLY) */
function drawCharts(){
    const dateMap={},catMap={};

    expenses.forEach(e=>{
        dateMap[e.date]=(dateMap[e.date]||0)+e.amount;
        catMap[e.category]=(catMap[e.category]||0)+e.amount;
    });

    const dates=Object.keys(dateMap).sort();
    const values=dates.map(d=>dateMap[d]);

    if(lineChart)lineChart.destroy();
    if(pieChart)pieChart.destroy();

    lineChart=new Chart(lineChartCtx,{
        type:"line",
        data:{
            labels:dates,
            datasets:[{
                data:values,
                borderColor:"green",
                backgroundColor:"rgba(0,128,0,0.2)",
                fill:true,
                tension:0.3
            }]
        }
    });

    pieChart=new Chart(pieChartCtx,{
        type:"pie",
        data:{
            labels:Object.keys(catMap),
            datasets:[{data:Object.values(catMap)}]
        },
        options:{aspectRatio:1}
    });
}

/* INIT */
const lineChartCtx=document.getElementById("lineChart").getContext("2d");
const pieChartCtx=document.getElementById("pieChart").getContext("2d");

document.getElementById("searchInput").addEventListener("input",render);

render();
</script>

</body>
</html>
