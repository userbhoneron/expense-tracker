<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Expense Tracker Pro</title>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: Arial;
    background: #f4f4f4;
}

.container {
    max-width: 520px;
    margin: 20px auto;
    background: white;
    padding: 15px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

h2 {
    margin-top: 0;
}

input {
    width: 100%;
    padding: 10px;
    margin-top: 6px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
}

.add { background: #28a745; color: white; }

.expense {
    display: flex;
    justify-content: space-between;
    background: #f1f1f1;
    padding: 8px;
    margin-top: 6px;
    border-radius: 6px;
}

.del {
    background: #dc3545;
    color: white;
    border: none;
    padding: 5px 8px;
    border-radius: 5px;
    cursor: pointer;
}

.edit {
    background: #ffc107;
    border: none;
    padding: 5px 8px;
    border-radius: 5px;
    cursor: pointer;
    margin-right: 5px;
}

.total {
    text-align: right;
    font-weight: bold;
    margin-top: 10px;
}

.graph {
    margin-top: 15px;
    height: 240px;
    background: #fafafa;
    border-radius: 10px;
    overflow: hidden;
}

svg {
    width: 100%;
    height: 100%;
}
</style>
</head>

<body>

<div class="container">
    <h2>Expense Tracker</h2>

    <input id="name" placeholder="Name">
    <input id="amount" type="number" placeholder="Amount">
    <input id="date" type="date">

    <button class="add" onclick="addExpense()">Add Expense</button>

    <div id="list"></div>
    <div class="total" id="total"></div>

    <div class="graph">
        <svg id="graph"></svg>
    </div>
</div>

<script>
let expenses = JSON.parse(localStorage.getItem("expenses")) || [];
let editingIndex = null;

/* SAVE */
function save() {
    localStorage.setItem("expenses", JSON.stringify(expenses));
}

/* ADD / EDIT */
function addExpense() {
    const name = document.getElementById("name").value;
    const amount = parseFloat(document.getElementById("amount").value);
    const date = document.getElementById("date").value;

    if (!name || !amount || !date) return;

    if (editingIndex !== null) {
        expenses[editingIndex] = { name, amount, date };
        editingIndex = null;
    } else {
        expenses.push({ name, amount, date });
    }

    save();
    clearInputs();
    render();
}

/* CLEAR INPUTS */
function clearInputs() {
    document.getElementById("name").value = "";
    document.getElementById("amount").value = "";
    document.getElementById("date").value = "";
}

/* DELETE */
function deleteExpense(i) {
    expenses.splice(i, 1);
    save();
    render();
}

/* EDIT */
function editExpense(i) {
    const e = expenses[i];
    document.getElementById("name").value = e.name;
    document.getElementById("amount").value = e.amount;
    document.getElementById("date").value = e.date;
    editingIndex = i;
}

/* RENDER */
function render() {
    const list = document.getElementById("list");
    const total = document.getElementById("total");

    list.innerHTML = "";

    let sum = 0;

    expenses.forEach((e, i) => {
        sum += e.amount;

        list.innerHTML += `
        <div class="expense">
            <div>
                <b>${e.name}</b><br>
                <small>${e.date}</small>
            </div>
            <div>
                ${e.amount}
                <button class="edit" onclick="editExpense(${i})">Edit</button>
                <button class="del" onclick="deleteExpense(${i})">X</button>
            </div>
        </div>`;
    });

    total.innerText = "Total: " + sum;

    drawGraph();
}

/* GRAPH */
function drawGraph() {
    const svg = document.getElementById("graph");
    svg.innerHTML = "";

    if (expenses.length === 0) return;

    const values = expenses.map(e => e.amount);
    const max = Math.max(...values);

    const w = 500;
    const h = 240;
    const step = w / (values.length - 1 || 1);

    const points = values.map((v, i) => [
        i * step,
        h - (v / max) * h
    ]);

    const path = "M " + points.map(p => p.join(",")).join(" L ");

    const line = document.createElementNS("http://www.w3.org/2000/svg", "path");
    line.setAttribute("d", path);
    line.setAttribute("stroke", "blue");
    line.setAttribute("fill", "none");
    line.setAttribute("stroke-width", "2");

    svg.appendChild(line);
}

/* INIT */
render();
</script>

</body>
</html>
