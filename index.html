<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Tracker</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: Arial;
    background: #f4f4f4;
}

body.dark { background:#121212; color:#eee; }

.container {
    max-width:520px;
    width:95%;
    margin:20px auto;
    background:white;
    padding:15px;
    border-radius:12px;
}

body.dark .container { background:#1e1e1e; }

input, select {
    width:100%;
    padding:10px;
    margin-top:6px;
    border-radius:8px;
    border:1px solid #ccc;
}

body.dark input, body.dark select {
    background:#2c2c2c;
    color:white;
    border:1px solid #444;
}

.add {
    width:100%;
    padding:12px;
    margin-top:8px;
    border:none;
    border-radius:8px;
    background:#66bb6a;
    color:white;
    font-weight:bold;
}

.fab {
    position:fixed;
    right:15px;
    width:45px;
    height:45px;
    border-radius:50%;
    border:none;
}

#darkBtn { top:15px; background:#2e7d32; color:white; }
#searchBtn { top:70px; background:#43a047; color:white; }
#reportBtn { top:125px; background:#1e88e5; color:white; }

.searchBox { display:none; margin-bottom:10px; }

/* SWIPE */
.expense-wrapper {
    position:relative;
    height:60px;
    margin-top:8px;
    overflow:hidden;
    border-radius:10px;
}

.delete-bg {
    position:absolute;
    right:0;
    width:80px;
    height:100%;
    background:#dc3545;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-weight:bold;
}

.expense {
    position:absolute;
    width:100%;
    height:100%;
    background:#f1f1f1;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px;
    transition:transform 0.2s;
}

body.dark .expense { background:#2a2a2a; }

canvas { width:100% !important; max-height:260px; }

#reportModal{
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.6);
    display:none;
    justify-content:center;
    align-items:center;
}

#reportBox{
    background:white;
    width:90%;
    max-width:420px;
    padding:15px;
    border-radius:12px;
}
</style>
</head>

<body>

<button id="darkBtn" class="fab" onclick="toggleDark()">🌙</button>
<button id="searchBtn" class="fab" onclick="toggleSearch()">🔍</button>
<button id="reportBtn" class="fab" onclick="toggleReport()">📊</button>

<div class="container">

<h2>Expense Tracker</h2>

<div class="searchBox" id="searchBox">
    <input id="searchInput" placeholder="Search name...">

    <select id="filterCategory">
        <option value="">All Categories</option>
    </select>

    <select id="filterMonth">
        <option value="">All Months</option>
        <option value="01">January</option>
        <option value="02">February</option>
        <option value="03">March</option>
        <option value="04">April</option>
        <option value="05">May</option>
        <option value="06">June</option>
        <option value="07">July</option>
        <option value="08">August</option>
        <option value="09">September</option>
        <option value="10">October</option>
        <option value="11">November</option>
        <option value="12">December</option>
    </select>

    <input id="fromDate" type="date">
    <input id="toDate" type="date">

    <input id="minAmount" type="number" placeholder="Min Amount">
    <input id="maxAmount" type="number" placeholder="Max Amount">
</div>

<input id="name" placeholder="Name">
<input id="amount" type="number" placeholder="Amount">
<input id="date" type="date">

<select id="category">
    <option>Food</option>
    <option>Transport</option>
    <option>Shopping</option>
    <option>Bills</option>
    <option>Entertainment</option>
    <option>Other</option>
</select>

<input id="customCategory" placeholder="Custom Category" disabled>

<button class="add" onclick="addExpense()">Add Expense</button>

<div id="list"></div>
<div id="total"></div>

<h4>Trend</h4>
<canvas id="lineChart"></canvas>

<h4>Category Breakdown</h4>
<canvas id="pieChart"></canvas>

</div>

<div id="reportModal">
<div id="reportBox">
<h3>Report</h3>
<div id="reportOutput"></div>
<button class="add" onclick="toggleReport()">Close</button>
</div>
</div>

<script>
let expenses = JSON.parse(localStorage.getItem("expenses")) || [];
let lineChart, pieChart;
let searchActive = false;

function toggleDark(){
    document.body.classList.toggle("dark");
}

function toggleSearch(){
    searchActive = !searchActive;
    searchBox.style.display = searchActive ? "block" : "none";
    if(!searchActive){
        searchInput.value="";
    }
    render();
}

category.addEventListener("change",()=>{
    customCategory.disabled = category.value !== "Other";
});

function addExpense(){
    let cat = category.value;
    if(cat==="Other" && customCategory.value){
        cat = customCategory.value;
    }

    if(!name.value||!amount.value||!date.value) return alert("Fill all");

    expenses.push({
        name:name.value,
        amount:+amount.value,
        date:date.value,
        category:cat
    });

    localStorage.setItem("expenses",JSON.stringify(expenses));

    name.value="";
    amount.value="";
    date.value="";
    customCategory.value="";

    render();
}

function deleteExpense(i){
    expenses.splice(i,1);
    localStorage.setItem("expenses",JSON.stringify(expenses));
    render();
}

function editExpense(i){
    const e=expenses[i];
    name.value=e.name;
    amount.value=e.amount;
    date.value=e.date;
    category.value=e.category;
}

function render(){
    list.innerHTML="";
    let sum=0;

    const text = searchInput.value.toLowerCase();
    const cat = filterCategory.value;
    const month = filterMonth.value;
    const from = fromDate.value;
    const to = toDate.value;
    const min = +minAmount.value || 0;
    const max = +maxAmount.value || Infinity;

    expenses.forEach((e,i)=>{

        const expenseMonth = e.date.split("-")[1];

        const match =
            (!text || e.name.toLowerCase().includes(text)) &&
            (!cat || e.category===cat) &&
            (!month || expenseMonth===month) &&
            (!from || e.date>=from) &&
            (!to || e.date<=to) &&
            (e.amount>=min && e.amount<=max);

        if(searchActive && !match) return;

        sum+=e.amount;

        list.innerHTML+=`
        <div class="expense-wrapper">
            <div class="delete-bg" onclick="deleteExpense(${i})">X</div>

            <div class="expense">
                <div>
                    <b>${e.name}</b><br>
                    <small>${e.date} • ${e.category}</small>
                </div>

                <div>
                    ${e.amount}
                    <button onclick="editExpense(${i})">Edit</button>
                </div>
            </div>
        </div>`;
    });

    total.innerText="Total: "+sum.toFixed(2);

    loadFilterCategories();
    drawCharts();
}

function loadFilterCategories(){
    const cats=[...new Set(expenses.map(e=>e.category))];
    filterCategory.innerHTML='<option value="">All Categories</option>';
    cats.forEach(c=> filterCategory.innerHTML+=`<option>${c}</option>`);
}

function drawCharts(){
    const dateMap={},catMap={};

    expenses.forEach(e=>{
        dateMap[e.date]=(dateMap[e.date]||0)+e.amount;
        catMap[e.category]=(catMap[e.category]||0)+e.amount;
    });

    const dates=Object.keys(dateMap).sort();
    const values=dates.map(d=>dateMap[d]);

    if(lineChart)lineChart.destroy();
    if(pieChart)pieChart.destroy();

    lineChart=new Chart(lineChart.getContext("2d"),{
        type:"line",
        data:{labels:dates,datasets:[{data:values}]}
    });

    pieChart=new Chart(pieChart.getContext("2d"),{
        type:"pie",
        data:{labels:Object.keys(catMap),datasets:[{data:Object.values(catMap)}]}
    });
}

function toggleReport(){
    if(reportModal.style.display==="flex"){
        reportModal.style.display="none";
        return;
    }

    let total=0, highest=0, lowest=Infinity, catMap={}, monthlyMap={};

    expenses.forEach(e=>{
        total+=e.amount;
        if(e.amount>highest) highest=e.amount;
        if(e.amount<lowest) lowest=e.amount;

        catMap[e.category]=(catMap[e.category]||0)+e.amount;
        const m=e.date.slice(0,7);
        monthlyMap[m]=(monthlyMap[m]||0)+e.amount;
    });

    const avg = expenses.length ? (total/expenses.length).toFixed(2) : 0;

    const topCategory = Object.entries(catMap).sort((a,b)=>b[1]-a[1])[0]?.[0] || "-";
    const topMonth = Object.entries(monthlyMap).sort((a,b)=>b[1]-a[1])[0]?.[0] || "-";

    reportOutput.innerHTML=`
        <p>Total: ${total.toFixed(2)}</p>
        <p>Average: ${avg}</p>
        <p>Top Category: ${topCategory}</p>
        <p>Top Month: ${topMonth}</p>
    `;

    reportModal.style.display="flex";
}

render();
</script>

</body>
</html>
