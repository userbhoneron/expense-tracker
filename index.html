<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Tracker</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: Arial;
    background: #f4f4f4;
}

body.dark {
    background: #121212;
    color: #eee;
}

/* SIDEBAR */
.sidebar {
    position: fixed;
    left: -250px;
    top: 0;
    width: 250px;
    height: 100%;
    background: #333;
    color: white;
    padding: 15px;
    transition: 0.3s;
    z-index: 10;
}

.sidebar.open {
    left: 0;
}

.sidebar button {
    width: 100%;
    margin-top: 10px;
    padding: 10px;
}

/* TOP BAR */
.topbar {
    display: flex;
    align-items: center;
    background: #28a745;
    color: white;
    padding: 10px;
}

.menu-btn {
    font-size: 20px;
    margin-right: 10px;
    cursor: pointer;
}

/* MAIN */
.container {
    width: 95%;
    max-width: 520px;
    margin: 10px auto;
    background: white;
    padding: 15px;
    border-radius: 12px;
}

body.dark .container {
    background: #1e1e1e;
}

input, select {
    width: 100%;
    padding: 12px;
    margin-top: 6px;
    border-radius: 8px;
}

/* SEARCH SCREEN */
.search-screen {
    display: none;
}

.expense {
    display: flex;
    justify-content: space-between;
    background: #f1f1f1;
    padding: 10px;
    margin-top: 6px;
    border-radius: 8px;
}

body.dark .expense {
    background: #2a2a2a;
}

button {
    padding: 10px;
    border: none;
    border-radius: 8px;
    margin-top: 8px;
}

canvas {
    width: 100% !important;
    height: 250px !important;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
    <h3>Menu</h3>
    <button onclick="showMain()">🏠 Home</button>
    <button onclick="showSearch()">🔍 Search</button>
    <button onclick="toggleDark()">🌙 Toggle Dark</button>
</div>

<!-- TOP BAR -->
<div class="topbar">
    <div class="menu-btn" onclick="toggleMenu()">☰</div>
    <h3>Expense Tracker</h3>
</div>

<!-- MAIN SCREEN -->
<div class="container" id="mainScreen">

<input id="name" placeholder="Name">
<input id="amount" type="number" placeholder="Amount">
<input id="date" type="date">

<select id="category" onchange="handleCategory()">
    <option value="">Category</option>
    <option>Food</option>
    <option>Transport</option>
    <option>Shopping</option>
    <option>Bills</option>
    <option>Entertainment</option>
    <option>Other</option>
</select>

<input id="customCategory" placeholder="Custom Category" disabled>

<button onclick="addExpense()">Add</button>

<div id="list"></div>
<div id="total"></div>

<h4>Daily Trend</h4>
<canvas id="lineChart"></canvas>

<h4>By Category</h4>
<canvas id="pieChart"></canvas>

</div>

<!-- SEARCH SCREEN -->
<div class="container search-screen" id="searchScreen">
    <h3>Search</h3>
    <input id="searchInput" placeholder="Search...">
    <div id="searchResults"></div>
</div>

<script>
let expenses = JSON.parse(localStorage.getItem("expenses")) || [];
let editingIndex = null;
let lineChart, pieChart;

/* MENU */
function toggleMenu() {
    document.getElementById("sidebar").classList.toggle("open");
}

/* SCREENS */
function showSearch() {
    document.getElementById("mainScreen").style.display = "none";
    document.getElementById("searchScreen").style.display = "block";
}

function showMain() {
    document.getElementById("mainScreen").style.display = "block";
    document.getElementById("searchScreen").style.display = "none";
}

/* DARK */
function toggleDark() {
    document.body.classList.toggle("dark");
}

/* CATEGORY */
function handleCategory() {
    const cat = document.getElementById("category").value;
    const custom = document.getElementById("customCategory");
    custom.disabled = cat !== "Other";
}

/* ADD */
function addExpense() {
    const name = nameInput.value.trim();
    const amount = parseFloat(amountInput.value);
    const date = dateInput.value;
    const cat = category.value;
    const custom = customCategory.value;

    if (!name || isNaN(amount) || !date || !cat) return;

    const finalCat = (cat === "Other" && custom) ? custom : cat;

    expenses.push({ name, amount, date, category: finalCat });
    localStorage.setItem("expenses", JSON.stringify(expenses));

    render();
}

/* RENDER */
function render() {
    const list = document.getElementById("list");
    list.innerHTML = "";

    let total = 0;

    expenses.forEach(e => {
        total += e.amount;
        list.innerHTML += `<div class="expense">
            ${e.name} (${e.category}) - ${e.amount}
        </div>`;
    });

    document.getElementById("total").innerText = "Total: " + total;

    drawCharts();
}

/* CHARTS */
function drawCharts() {
    const groupedDate = {};
    const groupedCat = {};

    expenses.forEach(e => {
        groupedDate[e.date] = (groupedDate[e.date] || 0) + e.amount;
        groupedCat[e.category] = (groupedCat[e.category] || 0) + e.amount;
    });

    const dates = Object.keys(groupedDate).sort();
    const values = dates.map(d => groupedDate[d]);

    if (lineChart) lineChart.destroy();
    if (pieChart) pieChart.destroy();

    lineChart = new Chart(lineChartCtx, {
        type: 'line',
        data: { labels: dates, datasets: [{ data: values, borderColor: 'green' }] }
    });

    pieChart = new Chart(pieChartCtx, {
        type: 'pie',
        data: {
            labels: Object.keys(groupedCat),
            datasets: [{ data: Object.values(groupedCat) }]
        }
    });
}

/* SEARCH */
searchInput.oninput = function() {
    const val = this.value.toLowerCase();
    const results = expenses.filter(e =>
        e.name.toLowerCase().includes(val) ||
        e.category.toLowerCase().includes(val) ||
        e.date.includes(val)
    );

    searchResults.innerHTML = results.map(e =>
        `<div class="expense">${e.name} - ${e.amount}</div>`
    ).join("");
};

/* INIT */
const lineChartCtx = document.getElementById("lineChart").getContext("2d");
const pieChartCtx = document.getElementById("pieChart").getContext("2d");

render();
</script>

</body>
</html>
