<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Tracker</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: Arial;
    background: #f4f4f4;
    transition: 0.3s;
}

body.dark {
    background: #121212;
    color: #eee;
}

/* CONTAINER */
.container {
    max-width: 520px;
    width: 95%;
    margin: 20px auto;
    background: white;
    padding: 15px;
    border-radius: 12px;
}

body.dark .container {
    background: #1e1e1e;
}

/* INPUTS */
input, select {
    width: 100%;
    padding: 12px;
    margin-top: 6px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 16px;
}

body.dark input,
body.dark select {
    background: #2c2c2c;
    color: white;
    border: 1px solid #444;
}

/* ADD BUTTON */
.add {
    width: 100%;
    padding: 12px;
    margin-top: 8px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    background: #66bb6a;
    color: white;
}

.add:hover {
    background: #4caf50;
}

/* EXPENSE CARD */
.expense {
    display: flex;
    justify-content: space-between;
    background: #f1f1f1;
    padding: 10px;
    margin-top: 8px;
    border-radius: 8px;
}

body.dark .expense {
    background: #2a2a2a;
}

/* EDIT / DELETE */
.edit {
    background: #ffc107;
    color: black;
    padding: 6px 10px;
    border-radius: 6px;
    margin-right: 5px;
    border: none;
    cursor: pointer;
}

.del {
    background: #dc3545;
    color: white;
    padding: 6px 10px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
}

body.dark .edit {
    background: #e0a800;
}

body.dark .del {
    background: #c82333;
}

/* TOTAL */
.total {
    text-align: right;
    font-weight: bold;
    margin-top: 10px;
}

/* SEARCH */
.searchBox {
    display: none;
    margin-bottom: 10px;
}

/* CHARTS */
canvas {
    width: 100% !important;
    max-height: 260px;
}

/* FLOATING BUTTONS */
.fab {
    position: fixed;
    right: 15px;
    width: 45px;
    height: 45px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    font-size: 18px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

#darkBtn {
    top: 15px;
    background: #2e7d32;
    color: white;
}

#searchBtn {
    top: 70px;
    background: #43a047;
    color: white;
}
</style>
</head>

<body>

<button id="darkBtn" class="fab" onclick="toggleDark()">🌙</button>
<button id="searchBtn" class="fab" onclick="toggleSearch()">🔍</button>

<div class="container">

<h2>Expense Tracker</h2>

<div class="searchBox" id="searchBox">
    <input id="searchInput" placeholder="Search...">
</div>

<input id="name" placeholder="Name">
<input id="amount" type="number" placeholder="Amount">
<input id="date" type="date">

<select id="category" onchange="handleCategory()"></select>

<input id="customCategory" placeholder="Custom Category (optional)" disabled>

<button class="add" onclick="addExpense()">Add Expense</button>

<div id="list"></div>
<div class="total" id="total"></div>

<h4>Trend</h4>
<canvas id="lineChart"></canvas>

<h4>Category Breakdown</h4>
<canvas id="pieChart"></canvas>

</div>

<script>
let expenses = JSON.parse(localStorage.getItem("expenses")) || [];
let customCategories = JSON.parse(localStorage.getItem("customCategories")) || [];

expenses = expenses.map(e => ({
    name: e.name || "",
    amount: Number(e.amount) || 0,
    date: e.date || "",
    category: e.category || "Other"
}));

let lineChart, pieChart;

/* LOAD CATEGORIES */
function loadCategories() {
    const base = ["Food","Transport","Shopping","Bills","Entertainment","Other"];
    const select = document.getElementById("category");

    select.innerHTML = "";

    base.forEach(c => {
        const opt = document.createElement("option");
        opt.value = c;
        opt.textContent = c;
        select.appendChild(opt);
    });

    if (customCategories.length > 0) {
        const sep = document.createElement("option");
        sep.disabled = true;
        sep.textContent = "──── Custom Categories ────";
        select.appendChild(sep);

        customCategories.forEach(c => {
            const opt = document.createElement("option");
            opt.value = c;
            opt.textContent = c;
            select.appendChild(opt);
        });
    }
}
loadCategories();

/* DARK MODE */
function toggleDark() {
    document.body.classList.toggle("dark");
}

/* SEARCH */
function toggleSearch() {
    const box = document.getElementById("searchBox");
    box.style.display = box.style.display === "block" ? "none" : "block";
}

/* CATEGORY */
function handleCategory() {
    const cat = document.getElementById("category").value;
    const custom = document.getElementById("customCategory");
    custom.disabled = cat !== "Other";
}

/* ADD EXPENSE */
function addExpense() {
    const name = document.getElementById("name").value.trim();
    const amount = parseFloat(document.getElementById("amount").value);
    const date = document.getElementById("date").value;
    const cat = document.getElementById("category").value;
    const custom = document.getElementById("customCategory").value.trim();

    if (!name || isNaN(amount) || !date || !cat) {
        alert("Fill all fields");
        return;
    }

    let finalCat = cat;

    if (cat === "Other" && custom) {
        finalCat = custom;

        if (!customCategories.includes(custom)) {
            customCategories.push(custom);
            localStorage.setItem("customCategories", JSON.stringify(customCategories));
            loadCategories();
        }
    }

    expenses.push({
        name,
        amount,
        date,
        category: finalCat
    });

    localStorage.setItem("expenses", JSON.stringify(expenses));

    clearInputs();
    render();
}

/* CLEAR */
function clearInputs() {
    document.getElementById("name").value = "";
    document.getElementById("amount").value = "";
    document.getElementById("date").value = "";
    document.getElementById("category").value = "";
    document.getElementById("customCategory").value = "";
    document.getElementById("customCategory").disabled = true;
}

/* DELETE */
function deleteExpense(i) {
    expenses.splice(i, 1);
    localStorage.setItem("expenses", JSON.stringify(expenses));
    render();
}

/* RENDER */
function render() {
    const list = document.getElementById("list");
    const total = document.getElementById("total");
    const search = document.getElementById("searchInput").value?.toLowerCase() || "";

    list.innerHTML = "";
    let sum = 0;

    expenses.forEach((e, i) => {

        const match =
            e.name.toLowerCase().includes(search) ||
            e.category.toLowerCase().includes(search) ||
            e.date.includes(search);

        if (search && !match) return;

        sum += e.amount;

        list.innerHTML += `
        <div class="expense">
            <div>
                <b>${e.name}</b><br>
                <small>${e.date} • ${e.category}</small>
            </div>
            <div>
                ${e.amount.toFixed(2)}
                <button class="edit">Edit</button>
                <button class="del" onclick="deleteExpense(${i})">X</button>
            </div>
        </div>`;
    });

    total.innerText = "Total: " + sum.toFixed(2);

    drawCharts();
}

/* CHARTS */
function drawCharts() {
    const dateMap = {};
    const catMap = {};

    expenses.forEach(e => {
        dateMap[e.date] = (dateMap[e.date] || 0) + e.amount;
        catMap[e.category] = (catMap[e.category] || 0) + e.amount;
    });

    const dates = Object.keys(dateMap).sort();
    const values = dates.map(d => dateMap[d]);

    if (lineChart) lineChart.destroy();
    if (pieChart) pieChart.destroy();

    lineChart = new Chart(lineChartCtx, {
        type: "line",
        data: {
            labels: dates,
            datasets: [{
                data: values,
                borderColor: "green",
                backgroundColor: "rgba(0,128,0,0.2)",
                tension: 0.3,
                fill: true,
                pointRadius: 5
            }]
        }
    });

    pieChart = new Chart(pieChartCtx, {
        type: "pie",
        data: {
            labels: Object.keys(catMap),
            datasets: [{
                data: Object.values(catMap)
            }]
        },
        options: {
            aspectRatio: 1
        }
    });
}

/* INIT */
const lineChartCtx = document.getElementById("lineChart").getContext("2d");
const pieChartCtx = document.getElementById("pieChart").getContext("2d");

document.getElementById("searchInput").addEventListener("input", render);

render();
</script>

</body>
</html>
