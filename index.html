<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Tracker</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: Arial;
    background: #f4f4f4;
    transition: 0.3s;
}

body.dark { background:#121212; color:#eee; }

.container {
    max-width: 520px;
    width: 95%;
    margin: 20px auto;
    background: white;
    padding: 15px;
    border-radius: 12px;
}

body.dark .container { background:#1e1e1e; }

input, select {
    width: 100%;
    padding: 12px;
    margin-top: 6px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

body.dark input, body.dark select {
    background:#2c2c2c;
    color:white;
    border:1px solid #444;
}

/* ADD BUTTON */
.add {
    width:100%;
    padding:12px;
    margin-top:8px;
    border:none;
    border-radius:8px;
    background:#66bb6a;
    color:white;
    font-weight:bold;
}

/* ========================= */
/* 🧠 SWIPE SLOT SYSTEM */
/* ========================= */

.expense-wrapper {
    position: relative;
    width: 100%;
    height: 60px;
    margin-top: 8px;
    overflow: hidden;
    border-radius: 10px;
}

/* delete behind layer */
.delete-bg {
    position: absolute;
    right: 0;
    top: 0;
    height: 100%;
    width: 80px;
    background: #dc3545;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: bold;
}

/* swipeable card */
.expense {
    position: absolute;
    left: 0;
    top: 0;
    height: 100%;
    width: 100%;
    background: #f1f1f1;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px;
    border-radius: 10px;
    touch-action: pan-y;
    transition: transform 0.2s ease;
}

body.dark .expense { background:#2a2a2a; }

/* compact text */
.expense small {
    font-size: 12px;
    opacity: 0.7;
}

.total {
    text-align:right;
    font-weight:bold;
    margin-top:10px;
}

/* floating buttons */
.fab {
    position:fixed;
    right:15px;
    width:45px;
    height:45px;
    border-radius:50%;
    border:none;
}

#darkBtn { top:15px; background:#2e7d32; color:white; }
#searchBtn { top:70px; background:#43a047; color:white; }

.searchBox { display:none; margin-bottom:10px; }

canvas { width:100% !important; max-height:260px; }
</style>
</head>

<body>

<button id="darkBtn" class="fab" onclick="toggleDark()">🌙</button>
<button id="searchBtn" class="fab" onclick="toggleSearch()">🔍</button>

<div class="container">

<h2>Expense Tracker</h2>

<div class="searchBox" id="searchBox">
    <input id="searchInput" placeholder="Search...">
</div>

<input id="name" placeholder="Name">
<input id="amount" type="number" placeholder="Amount">
<input id="date" type="date">

<select id="category" onchange="handleCategory()"></select>
<input id="customCategory" placeholder="Custom Category" disabled>

<button class="add" onclick="addExpense()">Add Expense</button>

<div id="list"></div>
<div class="total" id="total"></div>

<h4>Trend</h4>
<canvas id="lineChart"></canvas>

<h4>Category Breakdown</h4>
<canvas id="pieChart"></canvas>

</div>

<script>
let expenses = JSON.parse(localStorage.getItem("expenses")) || [];
let customCategories = JSON.parse(localStorage.getItem("customCategories")) || [];

let lineChart, pieChart;

/* CATEGORY LOAD */
function loadCategories() {
    const base = ["Food","Transport","Shopping","Bills","Entertainment","Other"];
    const select = document.getElementById("category");

    select.innerHTML = "";
    base.forEach(c => select.innerHTML += `<option>${c}</option>`);

    if (customCategories.length) {
        select.innerHTML += `<option disabled>──── Custom ────</option>`;
        customCategories.forEach(c => {
            select.innerHTML += `<option>${c}</option>`;
        });
    }
}
loadCategories();

/* DARK */
function toggleDark(){
    document.body.classList.toggle("dark");
}

/* SEARCH */
function toggleSearch(){
    searchBox.style.display = searchBox.style.display==="block"?"none":"block";
}

/* CATEGORY */
function handleCategory(){
    customCategory.disabled = category.value !== "Other";
}

/* ADD */
function addExpense(){
    const name = document.getElementById("name").value;
    const amount = +document.getElementById("amount").value;
    const date = document.getElementById("date").value;
    const cat = category.value;
    const custom = customCategory.value;

    if(!name||!amount||!date||!cat) return alert("Fill all");

    let finalCat = cat;

    if(cat==="Other" && custom){
        finalCat = custom;
        if(!customCategories.includes(custom)){
            customCategories.push(custom);
            localStorage.setItem("customCategories", JSON.stringify(customCategories));
            loadCategories();
        }
    }

    expenses.push({name,amount,date,category:finalCat});
    localStorage.setItem("expenses",JSON.stringify(expenses));

    clearInputs();
    render();
}

/* CLEAR */
function clearInputs(){
    name.value="";
    amount.value="";
    date.value="";
    category.value="";
    customCategory.value="";
    customCategory.disabled=true;
}

/* DELETE */
function deleteExpense(i){
    expenses.splice(i,1);
    localStorage.setItem("expenses",JSON.stringify(expenses));
    render();
}

/* ========================= */
/* 📱 SWIPE LOGIC */
/* ========================= */

let startX = 0;
let currentX = 0;
let activeEl = null;

function attachSwipe(el, index){

    const card = el.querySelector(".expense");

    card.addEventListener("touchstart",(e)=>{
        startX = e.touches[0].clientX;
        activeEl = card;
    });

    card.addEventListener("touchmove",(e)=>{
        if(!activeEl) return;

        currentX = e.touches[0].clientX;
        let diff = currentX - startX;

        if(diff < 0){
            card.style.transform = `translateX(${diff}px)`;
        }
    });

    card.addEventListener("touchend",()=>{
        let diff = currentX - startX;

        if(diff < -80){
            card.style.transform = "translateX(-80px)";
        } else {
            card.style.transform = "translateX(0px)";
        }

        activeEl = null;
    });

    /* desktop drag */
    card.addEventListener("mousedown",(e)=>{
        startX = e.clientX;
        activeEl = card;
    });

    window.addEventListener("mousemove",(e)=>{
        if(!activeEl) return;
        let diff = e.clientX - startX;
        if(diff < 0) activeEl.style.transform = `translateX(${diff}px)`;
    });

    window.addEventListener("mouseup",()=>{
        if(!activeEl) return;
        activeEl.style.transform = "translateX(0px)";
        activeEl = null;
    });
}

/* RENDER */
function render(){
    list.innerHTML="";
    let sum=0;

    const search = searchInput.value?.toLowerCase()||"";

    expenses.forEach((e,i)=>{

        const match =
        e.name.toLowerCase().includes(search) ||
        e.category.toLowerCase().includes(search) ||
        e.date.includes(search);

        if(search && !match) return;

        sum+=e.amount;

        const wrapper = document.createElement("div");
        wrapper.className="expense-wrapper";

        wrapper.innerHTML=`
            <div class="delete-bg" onclick="deleteExpense(${i})">X</div>
            <div class="expense">
                <div>
                    <b>${e.name}</b><br>
                    <small>${e.date} • ${e.category}</small>
                </div>
                <div>${e.amount.toFixed(2)}</div>
            </div>
        `;

        list.appendChild(wrapper);
        attachSwipe(wrapper,i);
    });

    total.innerText="Total: "+sum.toFixed(2);
    drawCharts();
}

/* CHARTS */
function drawCharts(){
    const dateMap={},catMap={};

    expenses.forEach(e=>{
        dateMap[e.date]=(dateMap[e.date]||0)+e.amount;
        catMap[e.category]=(catMap[e.category]||0)+e.amount;
    });

    const dates=Object.keys(dateMap).sort();
    const values=dates.map(d=>dateMap[d]);

    if(lineChart)lineChart.destroy();
    if(pieChart)pieChart.destroy();

    lineChart=new Chart(lineChartCtx,{
        type:"line",
        data:{labels:dates,datasets:[{
            data:values,
            borderColor:"green",
            backgroundColor:"rgba(0,128,0,0.2)",
            fill:true,
            tension:0.3
        }]}
    });

    pieChart=new Chart(pieChartCtx,{
        type:"pie",
        data:{labels:Object.keys(catMap),datasets:[{
            data:Object.values(catMap)
        }]},
        options:{aspectRatio:1}
    });
}

/* INIT */
const lineChartCtx=document.getElementById("lineChart").getContext("2d");
const pieChartCtx=document.getElementById("pieChart").getContext("2d");

render();
</script>

</body>
</html>
